        <h2>
          HTTP Status Codes: Complete Reference Guide (200, 404, 500 & More)
        </h2>
        
          HTTP
          <time dateTime="2026-03-22">March 22, 2026</time>

      /* Article Content */
      

        /* Opening: Problem-Solution */
        
          <p>
            Here is a scenario that plays out in production every week: an API returns <code >200 OK</code> with a body of <code >" \"error\": \"User not found\" "</code>. A mobile client sees the 200, skips error handling, and silently renders a broken screen. The fix is not a clever workaround — it is returning <code >404</code> in the first place.
          </p>
          <p>
            HTTP status codes are a contract between server and client, defined in <strong>RFC 9110</strong> (HTTP Semantics, published June 2022 by the IETF, superseding RFC 7231). There are 60+ registered codes across five classes. Using the wrong one breaks client logic, corrupts SEO signals, and makes your API hard to integrate. This guide covers every class with precise usage rules, the code pairs developers most often confuse, and a complete lookup table for quick reference.
          </p>
        

        /* Key Takeaways */
        
          <h2>Key Takeaways</h2>
          <ul>
            <li>&#8250;RFC 9110 (IETF, 2022) is the authoritative specification for HTTP status codes — it supersedes RFC 7231 and all earlier HTTP/1.1 specs.</li>
            <li>&#8250;The first digit tells you the class: 1xx informational, 2xx success, 3xx redirect, 4xx client error, 5xx server error. An unknown code in a class can be treated as its x00 baseline.</li>
            <li>&#8250;401 means unauthenticated (not who you are), 403 means unauthorized (you are known but forbidden). The names are misleading.</li>
            <li>&#8250;301 passes SEO link equity; 302 does not. Using the wrong redirect type is an unrecoverable SEO mistake until you correct it.</li>
            <li>&#8250;For API design: GET returns 200, POST returns 201, DELETE returns 204. Deviating from this without good reason creates integration friction.</li>
          </ul>
        

        /* Complete Reference Table */
        
          <h2>Complete HTTP Status Code Reference</h2>
          <p>
            The table below covers every status code you will commonly encounter in production. For a quick interactive lookup, use the <a href="/http-status-codes/">HTTP Status Codes tool</a> — enter any code and get its description, RFC reference, and common causes.
          </p>

          <h3>1xx — Informational</h3>
          <p>
            Provisional responses indicating the request was received and processing continues. Most HTTP clients handle these transparently — you will rarely write code that explicitly reads a 1xx response.
          </p>
          
            <table >
              <thead>
                <tr >
                  <th >Code</th>
                  <th >Name</th>
                  <th >Practical Usage</th>
                </tr>
              </thead>
              <tbody >
                <tr >
                  <td >100</td>
                  <td >Continue</td>
                  <td >Server received headers; client should send body. Used with <code >Expect: 100-continue</code> for large uploads</td>
                </tr>
                <tr >
                  <td >101</td>
                  <td >Switching Protocols</td>
                  <td >Protocol upgrade — the mechanism behind every WebSocket handshake</td>
                </tr>
                <tr >
                  <td >102</td>
                  <td >Processing (WebDAV)</td>
                  <td >Server accepted a long-running WebDAV request; prevents client timeout</td>
                </tr>
                <tr>
                  <td >103</td>
                  <td >Early Hints</td>
                  <td >Send <code >Link</code> preload headers before the final response — improves LCP by parallelizing resource fetches</td>
                </tr>
              </tbody>
            </table>
          
          <p>
            <strong>103 Early Hints</strong> is worth knowing in 2026. Supported by Chrome, Firefox, and Safari, it lets your server send <code >Link: &lt;/styles.css&gt;; rel=preload</code> headers before it finishes computing the response. According to Google&apos;s Web Platform team data published on web.dev, Early Hints can reduce Largest Contentful Paint by 20–30% on server-rendered pages where the critical CSS path is predictable.
          </p>

          <h3>2xx — Success</h3>
          <p>
            The server understood and fulfilled the request. Each 2xx code signals a subtly different kind of success — using the right one makes your API self-documenting.
          </p>
          
            <table >
              <thead>
                <tr >
                  <th >Code</th>
                  <th >Name</th>
                  <th >HTTP Methods</th>
                  <th >Response Body?</th>
                </tr>
              </thead>
              <tbody >
                <tr >
                  <td >200</td>
                  <td >OK</td>
                  <td >GET, PUT, PATCH, POST (actions)</td>
                  <td >Yes</td>
                </tr>
                <tr >
                  <td >201</td>
                  <td >Created</td>
                  <td >POST</td>
                  <td >Yes — include Location header</td>
                </tr>
                <tr >
                  <td >202</td>
                  <td >Accepted</td>
                  <td >POST, PUT</td>
                  <td >Yes — return job ID/status URL</td>
                </tr>
                <tr >
                  <td >204</td>
                  <td >No Content</td>
                  <td >DELETE, PUT, PATCH</td>
                  <td >No</td>
                </tr>
                <tr >
                  <td >206</td>
                  <td >Partial Content</td>
                  <td >GET</td>
                  <td >Yes — partial bytes per Range header</td>
                </tr>
                <tr>
                  <td >207</td>
                  <td >Multi-Status (WebDAV)</td>
                  <td >POST, DELETE</td>
                  <td >Yes — XML body with per-item statuses</td>
                </tr>
              </tbody>
            </table>
          
          <p>
            <code >`// 201 Created — always include Location pointing to the new resource
app.post('/api/users', async (req, res) => 
  const user = await db.createUser(req.body);
  res
    .status(201)
    .header('Location', \`/api/users/\$user.id\`)
    .json(user);
);

// 202 Accepted — async job queued; client polls the job URL
app.post('/api/exports', async (req, res) => 
  const job = await queue.enqueue('export', req.body);
  res.status(202).json(
    jobId: job.id,
    statusUrl: \`/api/jobs/\$job.id\`,
    estimatedCompletionMs: 5000,
  );
);

// 204 No Content — successful DELETE, no body
app.delete('/api/users/:id', async (req, res) => 
  await db.deleteUser(req.params.id);
  res.status(204).send();
);`</code>
          </pre>

          <h3>3xx — Redirection</h3>
          <p >
            The client must take additional action — usually following a <code >Location</code> header — to complete the request. Choosing the wrong redirect code is a silent SEO mistake that can persist for months.
          </p>
          
            <table >
              <thead>
                <tr >
                  <th >Code</th>
                  <th >Name</th>
                  <th >Permanent?</th>
                  <th >Preserves Method?</th>
                  <th >SEO Equity</th>
                </tr>
              </thead>
              <tbody >
                <tr >
                  <td >301</td>
                  <td >Moved Permanently</td>
                  <td >Yes</td>
                  <td >No (may change to GET)</td>
                  <td >Passes</td>
                </tr>
                <tr >
                  <td >302</td>
                  <td >Found</td>
                  <td >No</td>
                  <td >No (may change to GET)</td>
                  <td >Does not pass</td>
                </tr>
                <tr >
                  <td >303</td>
                  <td >See Other</td>
                  <td >No</td>
                  <td >Always GET</td>
                  <td >Does not pass</td>
                </tr>
                <tr >
                  <td >304</td>
                  <td >Not Modified</td>
                  <td >N/A</td>
                  <td >N/A</td>
                  <td >N/A — cache hit</td>
                </tr>
                <tr >
                  <td >307</td>
                  <td >Temporary Redirect</td>
                  <td >No</td>
                  <td >Yes</td>
                  <td >Does not pass</td>
                </tr>
                <tr>
                  <td >308</td>
                  <td >Permanent Redirect</td>
                  <td >Yes</td>
                  <td >Yes</td>
                  <td >Passes</td>
                </tr>
              </tbody>
            </table>
          
          <p>
            The critical decision: <strong>use 308 instead of 301 when redirecting POST/PUT/PATCH endpoints.</strong> RFC 9110 notes that 301 and 302 are historically ambiguous — browsers started converting POST redirects to GET, so 301 on a form submission effectively silently drops your POST body. 307 and 308 were introduced to fix this: they guarantee the HTTP method is preserved. For API redirects, always use 307 (temporary) or 308 (permanent), never 301/302.
          </p>
          <p>
            <strong>304 Not Modified</strong> is often overlooked but critical for performance. When a client sends an <code >If-None-Match</code> (ETag) or <code >If-Modified-Since</code> header and the resource has not changed, the server returns 304 with no body. The client uses its cached copy. According to MDN Web Docs, proper ETag validation is one of the most effective HTTP caching mechanisms for reducing bandwidth — a 304 response can be as small as a few hundred bytes vs. kilobytes for the full resource.
          </p>

          <h3>4xx — Client Errors</h3>
          <p>
            Something is wrong with the request. The server understood it but refuses to process it as-is. Every 4xx response should include a human-readable error message in the body — a bare 404 with no body is unhelpful to both developers and users.
          </p>

          <h2>The Codes Developers Most Often Confuse</h2>

          <h3>401 vs 403: Authentication vs Authorization</h3>
          <p>
            The RFC 9110 spec is explicit but the names are backwards from what most people expect. <strong>401 Unauthorized</strong> semantically means &quot;unauthenticated&quot; — the server does not know who you are. It requires a <code >WWW-Authenticate</code> header that tells the client how to authenticate (e.g., <code >Bearer</code>, <code >Basic</code>). <strong>403 Forbidden</strong> means the server knows exactly who you are but you do not have permission for this resource.
          </p>
          <p>
            A security note: returning 403 when a resource does not exist for the requesting user reveals information. If user A should not know whether user B&apos;s private resource exists, return 404 instead of 403. This prevents enumeration attacks. Per OWASP API Security Top 10 (2023 edition), broken object-level authorization (BOLA) is the #1 API vulnerability — 404-masking is one mitigation.
          </p>
          <p>
            <code >`// 401 — No token or invalid token (server doesn't know who you are)
if (!token || !verifyToken(token)) 
  return res
    .status(401)
    .header('WWW-Authenticate', 'Bearer realm="api"')
    .json( error: 'Authentication required' );

// 403 — Valid token but wrong role
if (req.user.role !== 'admin') 
  return res.status(403).json( error: 'Admin access required' );

// Security: return 404 instead of 403 when existence itself is sensitive
const doc = await db.findDoc(req.params.id);
if (!doc || doc.ownerId !== req.user.id) 
  // Don't reveal the doc exists — return 404 either way
  return res.status(404).json( error: 'Document not found' );
`</code>
          </pre>

          <h3>400 vs 422: Parse Error vs Validation Error</h3>
          <p >
            <strong>400 Bad Request</strong> is for requests the server cannot parse at all — malformed JSON, invalid URL encoding, missing required headers, or a query parameter that cannot be cast to the expected type. <strong>422 Unprocessable Entity</strong> (introduced for WebDAV in RFC 4918, generalized in RFC 9110) is for requests the server can parse but that fail semantic validation — valid JSON with a field value outside the accepted range, a duplicate email on registration, or a business rule violation.
          </p>
          <p>
            In practice: if your JSON parser throws a <code >SyntaxError</code>, return 400. If your validator (Zod, Joi, express-validator) rejects the parsed data, return 422. The distinction matters for API clients — a 400 means fix the structure, a 422 means fix the values.
          </p>

          <h3>502 vs 503 vs 504: Reverse Proxy Errors</h3>
          <p>
            All three come from your reverse proxy (Nginx, Cloudflare, AWS ALB, Traefik) when it cannot get a valid response from your application server. The distinction tells you exactly where to look:
          </p>
          <ul>
            <li><strong>502 Bad Gateway</strong> — Proxy reached the upstream server but got an invalid or empty response. Your app process is likely crashed. Check <code >systemctl status</code> or your container runtime.</li>
            <li><strong>503 Service Unavailable</strong> — Proxy cannot reach the upstream at all, or the upstream is deliberately rejecting connections (overloaded, maintenance mode, health check failing). Check your load balancer&apos;s health check status.</li>
            <li><strong>504 Gateway Timeout</strong> — Proxy reached the upstream but it did not respond within the configured timeout. Check for slow database queries, network latency, or CPU saturation. Per Nginx documentation, the default <code >proxy_read_timeout</code> is 60 seconds.</li>
          </ul>
        

        /* 5xx Section */
        
          <h2>5xx — Server Errors</h2>
          <p>
            Server errors mean the request was valid but the server failed to fulfill it. Every 5xx in production is a bug, misconfiguration, or capacity issue. These should all be monitored and alerting on sustained 5xx rates is table stakes for any production service.
          </p>

          <p>
            <code >`// Global error handler — catches any unhandled exceptions
// Never expose stack traces to clients in production
app.use((err, req, res, next) => 
  // Log the full error server-side
  logger.error( err, reqId: req.id , 'Unhandled error');

  res.status(500).json(
    error: process.env.NODE_ENV === 'production'
      ? 'Internal server error'
      : err.message,
  );
);

// 503 with Retry-After for graceful maintenance mode
app.use((req, res, next) => 
  if (maintenanceMode.isEnabled()) 
    return res
      .status(503)
      .header('Retry-After', String(maintenanceMode.expectedDurationSec()))
      .json( error: 'Scheduled maintenance in progress' );
  
  next();
);`</code>
          </pre>
        

        /* Retry Logic Section */
        
          <h2>Building Resilient Retry Logic Around Status Codes</h2>
          <p >
            A well-designed HTTP client should not retry blindly. Status codes tell you exactly which errors are recoverable. According to the Postman 2025 State of the API Report, which surveyed over 5,700 developers, unreliable APIs are the #1 developer pain point — and a major source of that unreliability is clients that crash on unexpected status codes instead of implementing graceful retry behavior.
          </p>
          <p>
            <code >`async function fetchWithRetry(url, options, maxRetries = 3) 
  for (let attempt = 0; attempt <= maxRetries; attempt++) 
    const res = await fetch(url, options);

    // Success — done
    if (res.ok) return res;

    // 4xx client errors — do NOT retry (except 408, 425, 429)
    if (res.status >= 400 && res.status < 500) 
      if (res.status === 429) 
        const retryAfter = res.headers.get('Retry-After');
        const waitMs = retryAfter ? parseInt(retryAfter) * 1000 : 1000;
        await sleep(waitMs);
        continue;
      
      // 401 — try refreshing the token once
      if (res.status === 401 && attempt === 0) 
        await refreshAccessToken();
        options.headers.Authorization = \`Bearer \$getToken()\`;
        continue;
      
      throw new ClientError(res.status, await res.json());
    

    // 5xx server errors — retry with exponential backoff
    if (attempt < maxRetries) 
      await sleep(Math.pow(2, attempt) * 200); // 200ms, 400ms, 800ms
      continue;
    

    throw new ServerError(res.status, 'Max retries exceeded');
  
`</code>
          </pre>
          <p >
            One important nuance: only retry <strong>idempotent requests</strong> (GET, PUT, DELETE, HEAD) on 5xx errors. Retrying a POST on a 502 can create duplicate resources if the original request actually succeeded server-side but the response was lost in transit. Use <a href="/blog/rest-api-best-practices/">idempotency keys</a> (a unique request ID sent in a header) if you need safe POST retries.
          </p>
        

        /* Caching Section */
        
          <h2>Status Codes and HTTP Caching</h2>
          <p>
            Not all status codes are cacheable by default. Per RFC 9110, the following codes are cacheable without explicit <code >Cache-Control</code> headers: <strong>200, 203, 204, 206, 300, 301, 308, 404, 405, 410, 414, 501</strong>. Note that 404 and 410 are cacheable — a CDN will cache your 404 responses unless you explicitly set <code >Cache-Control: no-store</code> or a short <code >max-age</code>. This causes the &quot;cached 404&quot; problem after you add a new route.
          </p>
          <p>
            <code >`# Nginx — prevent CDN from caching 404 errors
location / 
    try_files $uri $uri/ =404;
    # Add this to prevent caching 404 responses
    error_page 404 /404.html;

location = /404.html 
    add_header Cache-Control "no-store, no-cache";
    internal;

# For APIs, set short TTLs on error responses
location /api/ 
    proxy_pass http://app;
    # Cache 5xx errors for 5 seconds to absorb traffic spikes
    # But don't cache 4xx — they depend on request content
    proxy_cache_valid 200 201 204 10m;
    proxy_cache_valid 404 410 1m;
    proxy_cache_valid 500 502 503 504 5s;
`</code>
          </pre>
        

        /* Status Codes and SEO */
        
          <h2>HTTP Status Codes and SEO: What Google Actually Does</h2>
          <p >
            Googlebot treats status codes as signals for crawl budget and indexing. According to Google Search Central documentation (2025), here is how Googlebot responds to each class:
          </p>
          <ul>
            <li><strong>200</strong> — Page is crawled and eligible for indexing.</li>
            <li><strong>301/308</strong> — Link equity is passed to the destination URL. Google follows up to 10 redirect hops before giving up.</li>
            <li><strong>302/307</strong> — Temporary redirect; Google indexes the source URL, not the destination. No link equity passed.</li>
            <li><strong>404</strong> — Google removes the URL from its index after seeing consistent 404s over several crawl cycles (usually days to weeks). The URL stays in Search Console for 90 days after removal.</li>
            <li><strong>410</strong> — Google deindexes the URL faster than 404, typically within one or two crawl cycles. Use 410 for content you want removed from search results quickly.</li>
            <li><strong>500/503</strong> — Google temporarily reduces crawl rate. If 500s persist for more than a few days, Google may begin removing the affected URLs from its index.</li>
            <li><strong>noindex in 200</strong> — Overrides everything; the URL will not be indexed regardless of other signals.</li>
          </ul>
          <p>
            A common site migration mistake: returning 200 on a &quot;soft 404&quot; page (a page that says &quot;content not found&quot; but returns HTTP 200). Google Search Console flags these as &quot;Soft 404&quot; errors, and the pages consume crawl budget without contributing to rankings. Always return a real 404 or 410 for genuinely missing content.
          </p>
        

        /* Rate Limiting Best Practices */
        
          <h2>Implementing 429 Rate Limiting Correctly</h2>
          <p>
            RFC 6585 defines 429 Too Many Requests and specifies that it should include a <code >Retry-After</code> header. Beyond that minimum, well-designed APIs send proactive rate limit headers on every response so clients never hit the limit by surprise. The de-facto standard, used by GitHub, Stripe, Cloudflare, and most major APIs, is:
          </p>
          <p>
            <code >`// Rate limit headers on every response (not just 429)
X-RateLimit-Limit: 1000        // Total requests allowed in window
X-RateLimit-Remaining: 847     // Requests remaining in current window
X-RateLimit-Reset: 1742659200  // Unix timestamp when window resets

// 429 response
HTTP/1.1 429 Too Many Requests
Retry-After: 47
X-RateLimit-Limit: 1000
X-RateLimit-Remaining: 0
X-RateLimit-Reset: 1742659200
Content-Type: application/json

  "error": "rate_limit_exceeded",
  "message": "API rate limit exceeded. Retry in 47 seconds.",
  "retryAfter": 47
`</code>
          </pre>
          <p >
            For <a href="/blog/api-authentication-methods/">API authentication</a> endpoints specifically, rate limiting is a security control, not just a capacity measure. Without it, a credential-stuffing attack can test thousands of passwords per second. The OWASP API Security Top 10 (2023) lists &quot;Unrestricted Resource Consumption&quot; as a top vulnerability — rate limiting on auth endpoints is mandatory, not optional.
          </p>
        

        /* Error Response Format */
        
          <h2>Standardizing Error Response Bodies</h2>
          <p>
            RFC 9457 (Problem Details for HTTP APIs, July 2023) defines a standard JSON format for HTTP error responses. It is not widely enforced but widely recommended. The format uses <code >Content-Type: application/problem+json</code>:
          </p>
          <p>
            <code >`// RFC 9457 Problem Details format

  "type": "https://api.example.com/errors/validation-failed",
  "title": "Validation Failed",
  "status": 422,
  "detail": "The request body contains invalid fields.",
  "instance": "/api/users",
  "errors": [
     "field": "email", "message": "Must be a valid email address" ,
     "field": "age", "message": "Must be between 18 and 120" 
  ]

// Simpler format used by most production APIs

  "error": "validation_failed",
  "message": "Request validation failed",
  "details": [
     "field": "email", "code": "INVALID_FORMAT", "message": "Must be a valid email address" 
  ],
  "requestId": "req_01HV7X2P3K4Y5Z6W7Q8R9S0T"
`</code>
          </pre>
          <p >
            Always include a machine-readable error code (not just a human message), a unique request ID for support debugging, and a details array for validation errors. Use our <a href="/json-formatter/">JSON Formatter</a> to validate that your error response structures are well-formed before shipping them.
          </p>
        

        /* Quick Reference Cheat Sheet */
        
          <h2>API Design Decision Cheat Sheet</h2>
          <p>
            The most common question when building REST APIs: &quot;which status code should I return for X?&quot; This table covers the scenarios that come up in every project.
          </p>
          
            <table >
              <thead>
                <tr >
                  <th >Scenario</th>
                  <th >Correct Code</th>
                  <th >Common Mistake</th>
                </tr>
              </thead>
              <tbody >
                <tr ><td >GET returns data</td><td >200</td><td >—</td></tr>
                <tr ><td >GET returns empty list</td><td >200 []</td><td >404 (wrong — empty is not missing)</td></tr>
                <tr ><td >POST creates resource</td><td >201 + Location</td><td >200 (missing Location header)</td></tr>
                <tr ><td >DELETE resource</td><td >204</td><td >200 (not wrong, but 204 is cleaner)</td></tr>
                <tr ><td >Delete already-deleted resource</td><td >204 or 404</td><td >Context-dependent: idempotent DELETE returns 204</td></tr>
                <tr ><td >Async job queued</td><td >202 + status URL</td><td >200 (implies synchronous completion)</td></tr>
                <tr ><td >JSON body malformed</td><td >400</td><td >500 (if parser throws unhandled)</td></tr>
                <tr ><td >Validation fails (valid JSON)</td><td >422</td><td >400 (reserved for parse errors)</td></tr>
                <tr ><td >Duplicate record on POST</td><td >409</td><td >400 (too generic)</td></tr>
                <tr ><td >Missing auth token</td><td >401 + WWW-Authenticate</td><td >403 (conflates auth and authz)</td></tr>
                <tr ><td >Wrong role / insufficient scope</td><td >403</td><td >401 (confuses authentication with authorization)</td></tr>
                <tr><td >Permanent URL move</td><td >301 (GET) or 308 (POST)</td><td >302 (loses SEO equity)</td></tr>
              </tbody>
            </table>
          
        

        /* Internal tool reference */
        
          <h2>Debugging HTTP Status Codes in Development</h2>
          <p>
            When debugging HTTP responses, these tools in your workflow save the most time:
          </p>
          <ul>
            <li><strong>cURL with -I or -v</strong> — <code >curl -I https://example.com</code> for headers only; <code >-v</code> for full request/response trace including TLS handshake</li>
            <li><strong>Browser DevTools Network tab</strong> — filter by status code using the filter bar; <code >status-code:5xx</code> syntax works in Chrome</li>
            <li><strong>httpstat.us</strong> — test endpoint that returns any status code you specify for testing client error handling</li>
          </ul>
          <p>
            When building APIs that return <a href="/json-formatter/">JSON responses</a>, validating your error body structure is as important as setting the correct status code. A 422 with a poorly structured body is harder to integrate than a well-structured 400.
          </p>
          <p>
            For encoding issues in URL construction — which frequently cause 400 errors — use the <a href="/url-encode-decode/">URL Encoder/Decoder</a> to verify that special characters in query parameters and path segments are correctly percent-encoded per RFC 3986.
          </p>
        

        /* FAQ */
        
          <h2>Frequently Asked Questions</h2>
          

            
              <h3>What is the difference between 401 and 403?</h3>
              <p>
                401 Unauthorized means the server does not know who you are — authentication is missing or invalid. RFC 9110 requires a <code >WWW-Authenticate</code> header telling the client how to authenticate. 403 Forbidden means the server knows exactly who you are but you lack permission for the resource. The naming is misleading: 401 is really &quot;unauthenticated&quot; and 403 is truly &quot;unauthorized.&quot;
              </p>
            

            
              <h3>When should I use 200 vs 201 vs 204?</h3>
              <p>
                Use 200 OK for successful GET, PUT, and PATCH requests that return data. Use 201 Created after a POST that creates a new resource — always include a <code >Location</code> header pointing to the new resource URL. Use 204 No Content for successful DELETE operations or PUT/PATCH where you deliberately return no body. Using 200 for everything is one of the most common REST API mistakes.
              </p>
            

            
              <h3>What is the difference between 301 and 302 redirects?</h3>
              <p>
                301 Moved Permanently tells search engines and browsers this URL has changed forever — link equity (PageRank) transfers to the new URL and the redirect is cached indefinitely. 302 Found is a temporary redirect that does not transfer SEO value and should not be cached. For permanent URL changes, always use 301 or 308. For A/B testing or maintenance pages, use 302 or 307.
              </p>
            

            
              <h3>What causes a 502 Bad Gateway error?</h3>
              <p>
                A 502 Bad Gateway means your reverse proxy received an invalid or empty response from the upstream application server. Common causes: the application process crashed, memory was exhausted, or a firewall blocked the connection. Check application logs first, then proxy error logs. Distinct from 503 (app is alive but refusing connections) and 504 (app responded but too slowly).
              </p>
            

            
              <h3>Should I use 404 or 410 for deleted content?</h3>
              <p>
                Use 410 Gone when you know a resource has been permanently deleted and will never return. Per RFC 9110, 410 tells search engines to remove the URL from their index immediately, whereas 404 suggests the resource might return. For content you cannot track, 404 is fine. If you maintain a deletion log, return 410 — Google respects 410 faster than 404 for deindexing.
              </p>
            

            
              <h3>What does 422 Unprocessable Entity mean vs 400 Bad Request?</h3>
              <p>
                400 Bad Request means the request is syntactically malformed — the server cannot parse it at all. 422 Unprocessable Entity means the request is syntactically valid (parseable) but semantically invalid — a required field is missing or a value fails business logic validation. Use 400 for parse errors and 422 for validation errors. The distinction helps API clients know whether to fix the structure or fix the values.
              </p>
            

            
              <h3>What HTTP status code should an API return for rate limiting?</h3>
              <p>
                Return 429 Too Many Requests with a <code >Retry-After</code> header specifying when the client can retry. Also include <code >X-RateLimit-Limit</code>, <code >X-RateLimit-Remaining</code>, and <code >X-RateLimit-Reset</code> headers on all responses so clients can track their quota proactively and avoid hitting the limit.
              </p>
            

            
              <h3>Is 204 No Content the right code after a DELETE?</h3>
              <p>
                Yes — 204 No Content is the standard for a successful DELETE that returns no body. Some APIs return 200 with the deleted resource in the body, which is also acceptable per RFC 9110. What you should never do is return 404 after successfully deleting a resource — the deletion succeeded, so a 2xx code is correct. An idempotent DELETE of an already-deleted resource can legitimately return either 204 or 404 depending on your API contract.
              </p>
