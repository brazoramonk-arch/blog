        /* Opening with alarming stat — problem framing */
        
          <p>
            <strong>84% of organizations experienced an API security incident in the past 12 months</strong> — per a 2024 survey of 1,200 IT and security professionals. The 2025 Global State of API Security Report (Traceable AI) found that 57% of organizations suffered API-related data breaches in the past two years, and 28% of those breaches compromised sensitive data and critical systems. Meanwhile, a Treblle analysis of over 1 billion API calls found that only <strong>15% of APIs implement rate limiting</strong>.
          </p>
          <p>
            The problem is rarely that developers don&apos;t know the basics. It&apos;s that security and performance best practices get treated as optional enhancements rather than table stakes. This guide covers the practices that actually matter in production.
          </p>
        

        /* Key Takeaways */
        
          <h2>Key Takeaways</h2>
          <ul>
            <li>▸REST powers 83% of web services, but the gap between a functional API and a production-grade one is enormous — most organizations are not closing it.</li>
            <li>▸Rate limiting is the single most neglected practice: only 15% of APIs implement it per Treblle&apos;s analysis of 1B+ calls. It protects both availability and your budget.</li>
            <li>▸Use 401 for unauthenticated and 403 for unauthorized — they are semantically different, and CDNs/gateways use this distinction for caching decisions.</li>
            <li>▸Never expose stack traces, internal IDs, or database errors in API responses — this is an OWASP API Security Top 10 failure mode.</li>
            <li>▸Per the Postman 2025 State of the API report (5,700+ respondents), 82% of organizations have adopted API-first design — the remaining 18% consistently struggle with integration churn.</li>
          </ul>
        

        
          <h2>Common Mistakes vs. Best Practices</h2>
          <p>
            Most of these violations are not exotic edge cases — they show up repeatedly in code reviews, security audits, and production incidents. Here&apos;s the pattern of what separates functional APIs from well-engineered ones:
          </p>
          
            <table >
              <thead>
                <tr >
                  <th >Area</th>
                  <th >Common Mistake</th>
                  <th >Best Practice</th>
                </tr>
              </thead>
              <tbody >
                <tr >
                  <td >HTTP Methods</td>
                  <td >POST for everything (<code >/getUsers</code>)</td>
                  <td >GET/POST/PUT/PATCH/DELETE per semantics</td>
                </tr>
                <tr >
                  <td >Error codes</td>
                  <td >Always return 200, encode status in body</td>
                  <td >Use correct 4xx/5xx with structured body</td>
                </tr>
                <tr >
                  <td >Error body</td>
                  <td >Bare string or raw exception message</td>
                  <td >Structured JSON with code, message, request_id</td>
                </tr>
                <tr >
                  <td >Rate limiting</td>
                  <td >No limits (85% of APIs per Treblle)</td>
                  <td >429 + Retry-After + rate limit headers</td>
                </tr>
                <tr >
                  <td >Versioning</td>
                  <td >Break existing clients on updates</td>
                  <td >URL path versioning (<code >/v1/</code>)</td>
                </tr>
                <tr >

                </tr>

                </tr>

                  <td >Stack traces, SQL errors, internal IDs</td>
                  <td >Opaque error codes + request_id for tracing</td>
                </tr>
              </tbody>
            </table>
          
        

        
          <h2>Authentication: Choosing the Right Method</h2>
          <p>
            Authentication is not one-size-fits-all. The right choice depends on your API&apos;s consumers (internal microservices, third-party developers, browser clients), your security requirements, and your operational complexity tolerance. Here is a practical decision framework:
          </p>

          <h3>API Keys: Simple but Risky If Mishandled</h3>
          <p>
            API keys are the simplest authentication mechanism — a single secret string passed in a header. They are appropriate for server-to-server communication where the client can store secrets securely, and for public APIs where you want low integration friction.
          </p>
          <p>
            <code >`# Always in a header — never in the URL (URLs are logged)
GET /api/v1/data
Authorization: Bearer sk_live_abc123xyz

# Wrong: key in query parameter (gets logged everywhere)
GET /api/v1/data?api_key=sk_live_abc123xyz  # ✗

# Rotate keys without downtime: support overlapping keys
GET /api/v1/data
Authorization: Bearer sk_live_newkey456     # ✓ new key works
# Old key still valid for 24h grace period`</code>
          </pre>

          <h3>JWT Bearer Tokens: Stateless, Scalable</h3>
          <p >
            JWTs are the standard for stateless API authentication. The token contains signed claims — no server-side session lookup required. This makes them ideal for horizontally scaled services. The cost is revocation complexity: you cannot invalidate a JWT before it expires without a blocklist, which reintroduces statefulness.
          </p>
          <p>
            <code >`// JWT structure: header.payload.signature
// All three parts are Base64URL-encoded

// Validate on every request — don't trust unverified claims

function authenticate(req, res, next) 
  const token = req.headers.authorization?.split(' ')[1];
  if (!token) return res.status(401).json( error:  code: 'MISSING_TOKEN'  );

  try 
    const payload = jwt.verify(token, process.env.JWT_SECRET, 
      algorithms: ['HS256'],   // Never accept 'none'
      issuer: 'api.example.com',
      audience: 'api-clients',
    );
    req.user = payload;
    next();
   catch (err) 
    return res.status(401).json( error:  code: 'INVALID_TOKEN'  );
  
`</code>
          </pre>
          <p >
            Never accept the <code >none</code> algorithm in JWT validation — this was the vector for a category of CVEs where attackers forged tokens by stripping the signature. Always specify the expected algorithm explicitly.
          </p>

          <h3>OAuth 2.0: Delegated Authorization</h3>
          <p>
            OAuth 2.0 is for delegated authorization — allowing third-party clients to act on behalf of a user without sharing their password. Use the Authorization Code + PKCE flow for public clients (SPAs, mobile apps). Client Credentials flow for machine-to-machine. Never use the deprecated Implicit flow for new integrations.
          </p>
          <p>
            <code >`# OAuth 2.0 Authorization Code + PKCE flow (simplified)

# Step 1: Redirect user to authorization server
GET https://auth.example.com/oauth/authorize
  ?response_type=code
  &client_id=app_123
  &redirect_uri=https://yourapp.com/callback
  &scope=read:users write:reports
  &code_challenge=BASE64URL(SHA256(code_verifier))  # PKCE
  &code_challenge_method=S256
  &state=random_csrf_token

# Step 2: Exchange code for tokens
POST https://auth.example.com/oauth/token

  "grant_type": "authorization_code",
  "code": "auth_code_from_redirect",
  "redirect_uri": "https://yourapp.com/callback",
  "code_verifier": "original_random_string"   # PKCE verifier

# Step 3: Use access token
GET /api/v1/users
Authorization: Bearer eyJhbGciOiJSUzI1NiJ9...`</code>
          </pre>
        

        
          <h2>Rate Limiting: The Most Neglected Practice</h2>
          <p >
            A Treblle analysis of over 1 billion API calls to 500,000 endpoints across 15,000 real-world APIs found that only <strong>15% implement any form of rate limiting</strong>. This is the single largest gap between best practice and actual practice. Without rate limiting, a single misbehaving client — or attacker — can exhaust your server resources, drive up your cloud bill, or trigger downstream throttling from third-party services.
          </p>

          <h3>Rate Limit Response Headers</h3>
          <p>
            <code >`# Successful response — include rate limit state
HTTP/1.1 200 OK
X-RateLimit-Limit: 1000        # Max requests per window
X-RateLimit-Remaining: 847     # Remaining in current window
X-RateLimit-Reset: 1742169600  # Unix timestamp when window resets
Content-Type: application/json

# Rate limit exceeded
HTTP/1.1 429 Too Many Requests
Retry-After: 30                # Seconds until they can retry
X-RateLimit-Limit: 1000
X-RateLimit-Remaining: 0
X-RateLimit-Reset: 1742169600

  "error": 
    "code": "RATE_LIMIT_EXCEEDED",
    "message": "You have exceeded 1000 requests per hour.",
    "retry_after_seconds": 30,
    "request_id": "req_a1b2c3d4"
  
`</code>
          </pre>

          <h3>Choosing a Rate Limiting Algorithm</h3>
          
            <table >
              <thead>
                <tr >
                  <th >Algorithm</th>
                  <th >Behavior</th>
                  <th >Best For</th>
                </tr>
              </thead>
              <tbody >
                <tr ><td >Fixed Window</td><td >Count resets at fixed intervals</td><td >Simple quotas, predictable behavior</td></tr>
                <tr ><td >Sliding Window</td><td >Rolling count over the last N seconds</td><td >Prevents burst attacks at window boundaries</td></tr>
                <tr ><td >Token Bucket</td><td >Tokens refill at constant rate; burst allowed up to bucket size</td><td >APIs with legitimate burst patterns (batch uploads)</td></tr>
                <tr><td >Leaky Bucket</td><td >Requests processed at constant rate; excess queued or dropped</td><td >Smooth traffic shaping, downstream protection</td></tr>
              </tbody>
            </table>
          
          <p >
            Implement rate limiting at the reverse proxy or API gateway layer (Nginx, Kong, Cloudflare, AWS API Gateway), not in application code. This protects you even before requests reach your service, and works correctly across multiple application instances without requiring shared state in your app.
          </p>
        

        
          <h2>Consistent Error Responses</h2>
          <p>
            Error responses are arguably more important to design carefully than success responses. When an integration breaks at 2 AM, the error body is all the on-call engineer has to go on. A well-structured error response answers three questions: what happened, why it happened, and what to do about it.
          </p>
          <p>
            <code >`// The gold standard error envelope — use it for every error
// HTTP 422 Unprocessable Entity

  "error": 
    "code": "VALIDATION_ERROR",           // Machine-readable, stable string
    "message": "Request body is invalid.", // Human-readable, for developers
    "request_id": "req_7x9k2m4p",         // Correlates to your logs
    "documentation_url": "https://api.example.com/docs/errors#VALIDATION_ERROR",
    "details": [                           // Field-level validation errors
      
        "field": "email",
        "code": "INVALID_FORMAT",
        "message": "Must be a valid email address.",
        "rejected_value": "not-an-email"
      ,
      
        "field": "age",
        "code": "OUT_OF_RANGE",
        "message": "Must be between 1 and 120.",
        "rejected_value": -5
      
    ]
  

// 500 error — NEVER expose internals
// HTTP 500 Internal Server Error

  "error": 
    "code": "INTERNAL_ERROR",
    "message": "An unexpected error occurred.",
    "request_id": "req_9z3n8v1q"   // Give this to support; maps to full trace internally
    // ✗ NEVER include: stack trace, SQL query, internal path, exception message
  
`</code>
          </pre>
          <p >
            Validate your error response shapes with our <a href="/json-formatter/">JSON Formatter</a> before documenting them. Consistency across all endpoints is more important than the specific schema — if your team debates the naming for more than 15 minutes, pick one and move on.
          </p>

          <h3>HTTP Status Code Decision Tree</h3>
          
            <table >
              <thead>
                <tr >
                  <th >Code</th>
                  <th >Use When</th>
                  <th >Common Mistake</th>
                </tr>
              </thead>
              <tbody >
                <tr ><td >200 OK</td><td >GET/PUT/PATCH succeeded</td><td >Using 200 for errors with an error body</td></tr>
                <tr ><td >201 Created</td><td >POST created a resource</td><td >Returning 200 after creation (missing Location header)</td></tr>
                <tr ><td >204 No Content</td><td >DELETE succeeded, no body</td><td >Returning 200 with empty body instead</td></tr>
                <tr ><td >400 Bad Request</td><td >Malformed syntax, unparseable body</td><td >Using 400 for all validation errors (use 422)</td></tr>
                <tr ><td >401 Unauthorized</td><td >Missing or invalid credentials</td><td >Using 403 when authentication is missing</td></tr>
                <tr ><td >403 Forbidden</td><td >Authenticated but lacks permission</td><td >Using 404 to hide resource existence (valid but intentional)</td></tr>
                <tr ><td >404 Not Found</td><td >Resource does not exist</td><td >Using 400 for not-found resources</td></tr>
                <tr ><td >409 Conflict</td><td >Duplicate create, state conflict</td><td >Using 400 for uniqueness violations</td></tr>
                <tr ><td >422 Unprocessable</td><td >Syntactically valid but semantically invalid</td><td >Using 400 for all validation failures</td></tr>
                <tr ><td >429 Too Many Requests</td><td >Rate limit exceeded</td><td >Using 503 or returning no Retry-After</td></tr>
                <tr><td >503 Service Unavailable</td><td >Intentional downtime / overload</td><td >Returning 500 during planned maintenance</td></tr>
              </tbody>
            </table>
          
        

        
          <h2>API Versioning in Practice</h2>
          <p>
            The SmartBear API survey of 1,100+ API professionals found that <strong>71% of teams use API versioning</strong>, but only 57% of those use semantic versioning conventions. The other 43% use ad hoc schemes — which creates ambiguity for consumers about what constitutes a breaking change.
          </p>

          <h3>What Counts as a Breaking Change</h3>
          
            <table >
              <thead>
                <tr >
                  <th >Change Type</th>
                  <th >Breaking ✗</th>
                  <th >Non-Breaking ✓</th>
                </tr>
              </thead>
              <tbody >
                <tr >
                  <td >Fields</td>
                  <td >Removing or renaming a field</td>
                  <td >Adding optional fields</td>
                </tr>
                <tr >
                  <td >Types</td>
                  <td >Changing a field&apos;s type (string → int)</td>
                  <td >Widening an enum to include new values</td>
                </tr>
                <tr >
                  <td >Endpoints</td>
                  <td >Removing or renaming an endpoint</td>
                  <td >Adding new endpoints</td>
                </tr>
                <tr >
                  <td >Auth</td>
                  <td >Requiring new required scopes</td>
                  <td >Adding optional auth methods</td>
                </tr>
                <tr>
                  <td >Status codes</td>
                  <td >Changing a success code to a different success code</td>
                  <td >Adding new error codes</td>
                </tr>
              </tbody>
            </table>
          
          <p>
            <code >`# URL path versioning (recommended)
GET /api/v1/users/42      # stable, visible in logs and browser
GET /api/v2/users/42      # new version coexists

# Deprecation: communicate timeline in headers before removing
HTTP/1.1 200 OK
Deprecation: true
Sunset: Sat, 31 Dec 2026 23:59:59 GMT
Link: </api/v2/users/42>; rel="successor-version"

# Versioning your OpenAPI spec
openapi: "3.1.0"
info:
  version: "2.4.1"   # Semver: major.minor.patch
  title: "Example API"
  # major = breaking, minor = feature, patch = bugfix`</code>
          </pre>
        

        
          <h2>Pagination: Offset vs. Cursor</h2>
          <p >
            Any endpoint returning a collection must support pagination with a configurable page size ceiling (typically 100-250 items). Never return unbounded collections — at scale, a single <code >GET /orders</code> with no limit can return millions of rows.
          </p>

          <h3>Offset Pagination</h3>
          <p>
            <code >`GET /api/v1/orders?page=3&per_page=25

// Response

  "data": [ ... ],
  "pagination": 
    "page": 3,
    "per_page": 25,
    "total_items": 1250,
    "total_pages": 50,
    "next": "/api/v1/orders?page=4&per_page=25",
    "prev": "/api/v1/orders?page=2&per_page=25"
  

// The problem: if a record is inserted on page 2 while you're reading page 3,
// you'll see a duplicate. If one is deleted, you'll skip an item.`</code>
          </pre>

          <h3>Cursor Pagination (Recommended for Live Data)</h3>
          <pre >
            <code >`// Cursor is an opaque Base64-encoded pointer to last seen record
GET /api/v1/orders?limit=25&after=eyJpZCI6MTAwLCJ0cyI6MTcwMDAwMH0=

// Response

  "data": [ ... ],
  "pagination": 
    "next_cursor": "eyJpZCI6MTI1LCJ0cyI6MTcwMDAxMH0=",
    "prev_cursor": "eyJpZCI6NzYsInRzIjoxNjk5OTk1fQ==",
    "has_more": true
  

// Server-side: decode cursor to get the last seen primary key
// SELECT * FROM orders WHERE id > :cursor_id ORDER BY id LIMIT :limit
// No COUNT(*) needed — much faster on large tables`</code>
          </pre>
          <p >
            Cursor pagination has no concept of &quot;total pages&quot; or &quot;jump to page 50&quot; — this is intentional. For use cases that require random access (admin dashboards, reporting), offset pagination is fine. For infinite scroll, activity feeds, or any data that changes frequently, cursor pagination is the correct choice. Use our <a href="/base64/">Base64 Encoder/Decoder</a> to inspect and debug cursor values during development.
          </p>
        

        
          <h2>Security Headers and CORS</h2>
          <p>
            OWASP API Security Top 10 includes &quot;Broken Object Level Authorization&quot;, &quot;Broken Function Level Authorization&quot;, and &quot;Security Misconfiguration&quot; as three of the top API vulnerabilities. Proper security headers are a baseline requirement that takes under an hour to configure and protects against entire categories of attacks.
          </p>
          <p>
            <code >`// Nginx: API-appropriate security headers
add_header Content-Type "application/json" always;
add_header X-Content-Type-Options "nosniff" always;
add_header X-Frame-Options "DENY" always;
add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
add_header Referrer-Policy "no-referrer" always;

// In your API framework (Express.js example with helmet)

app.use(helmet());

// CORS: scope to specific origins — never wildcard authenticated endpoints
const corsOptions = 
  origin: process.env.ALLOWED_ORIGINS?.split(',') ?? [],
  methods: ['GET', 'POST', 'PUT', 'PATCH', 'DELETE'],
  allowedHeaders: ['Content-Type', 'Authorization'],
  credentials: true,    // Allows cookies/auth headers
  maxAge: 86400,        // Cache preflight for 24h
;
app.use(cors(corsOptions));

// ✗ NEVER for authenticated endpoints:
// Access-Control-Allow-Origin: *    (allows any site to make credentialed requests)`</code>
          </pre>

          <h3>Input Validation: Defense in Depth</h3>
          <pre >
            <code >`// Validate at the API boundary — never trust client input
// Example using Zod (TypeScript schema validation)

const CreateUserSchema = z.object(
  name: z.string().min(1).max(100).trim(),
  email: z.string().email().toLowerCase(),
  age: z.number().int().min(1).max(120).optional(),
  role: z.enum(['user', 'admin']).default('user'),
);

app.post('/api/v1/users', async (req, res) => 
  const result = CreateUserSchema.safeParse(req.body);
  if (!result.success) 
    return res.status(422).json(
      error: 
        code: 'VALIDATION_ERROR',
        message: 'Request body contains invalid fields.',
        details: result.error.issues.map(issue => (
          field: issue.path.join('.'),
          code: issue.code,
          message: issue.message,
        )),
        request_id: req.id,
      
    );
  
  // result.data is now type-safe and sanitized
  const user = await createUser(result.data);
  res.status(201).json( data: user );
);`</code>
          </pre>
        

        
          <h2>Performance: Caching, Compression, and Field Selection</h2>
          <p >
            REST has a structural advantage over GraphQL for caching: GET requests with fixed URLs can be cached at the CDN level with zero application code. This is a significant performance win that many teams leave on the table by using POST for read operations or by not setting cache headers correctly.
          </p>

          <h3>HTTP Caching Headers</h3>
          <p>
            <code >`// Public, cacheable for 1 hour (good for reference data)
HTTP/1.1 200 OK
Cache-Control: public, max-age=3600, stale-while-revalidate=600
ETag: "33a64df551425fcc55e4d42a148795d9f25f89d4"

// Private, user-specific data
HTTP/1.1 200 OK
Cache-Control: private, max-age=60
Vary: Authorization

// Conditional GET: client revalidates with ETag
GET /api/v1/products/42
If-None-Match: "33a64df551425fcc55e4d42a148795d9f25f89d4"

// Server response if unchanged (saves bandwidth entirely)
HTTP/1.1 304 Not Modified

// Disable caching for sensitive endpoints
Cache-Control: no-store, no-cache, must-revalidate`</code>
          </pre>

          <h3>Field Selection and Response Shaping</h3>
          <pre >
            <code >`// Allow clients to request only the fields they need
// Reduces payload size — critical for mobile clients and high-frequency polling
GET /api/v1/users/42?fields=id,name,email

// Response — only requested fields

  "id": 42,
  "name": "Alice Chen",
  "email": "alice@example.com"
  // billing_address, payment_methods, preferences — not included

// Also support embedding related resources to reduce round trips
GET /api/v1/orders/7?include=user,items

// Response — avoids N+1 requests

  "id": 7,
  "status": "shipped",
  "user":  "id": 42, "name": "Alice Chen" ,
  "items": [...]
`</code>
          </pre>
          <p >
            For large API responses, always enable gzip/Brotli compression at the proxy level. Brotli achieves 20-26% better compression than gzip on JSON, and virtually all modern clients support it. Use our <a href="/json-formatter/">JSON Formatter</a> to understand your response structure and spot unnecessarily verbose fields.
          </p>
        

        
          <h2>Observability: Logging, Tracing, and Metrics</h2>
          <p>
            The Postman 2025 State of the API report found that <strong>93% of teams struggle with API collaboration</strong>, leading to duplicated work and integration delays. A significant part of this is inadequate observability — without structured logs and request tracing, diagnosing cross-service issues becomes archaeology rather than engineering.
          </p>
          <p>
            <code >`// Structured logging: every request should produce a log line like this

  "timestamp": "2026-03-17T14:32:01.456Z",
  "level": "info",
  "request_id": "req_a1b2c3d4",           // Same ID in error responses
  "trace_id": "4bf92f3577b34da6a3ce929d",  // OpenTelemetry trace
  "method": "POST",
  "path": "/api/v1/users",

X-Request-Id: req_a1b2c3d4
Content-Type: application/json`</code>

          <h2>Frequently Asked Questions</h2>
          
            
              <h3>Should I use URL path versioning or header versioning?</h3>
              <p>URL path versioning (<code >/api/v1/users</code>) is the industry standard used by Stripe, GitHub, and Google. It makes the version visible in every log line, browser network tab, and support ticket. Per the SmartBear survey of 1,100+ API professionals, 71% use API versioning — URL path is the dominant approach. Header versioning is architecturally purer but dramatically harder to debug.</p>
            
            
              <h3>What is the difference between 401 and 403?</h3>
              <p>401 Unauthorized means the request lacks valid credentials — the client is not authenticated. Despite the confusing name, it means &quot;unauthenticated.&quot; 403 Forbidden means credentials are valid but the user lacks permission for this specific resource or action. Return 401 for missing, expired, or malformed tokens. Return 403 when the authenticated user simply doesn&apos;t have access. CDNs and security tools use this distinction for logging and alerting.</p>
            
            
              <h3>How should I implement rate limiting?</h3>
              <p>Implement rate limiting at the reverse proxy or API gateway level (Nginx, Kong, Cloudflare) — not in application code — so it works across all instances. Return rate limit state in headers (<code >X-RateLimit-Limit</code>, <code >X-RateLimit-Remaining</code>, <code >X-RateLimit-Reset</code>). Return 429 with a <code >Retry-After</code> header when exceeded. Per Treblle&apos;s analysis of 1 billion API calls, only 15% of APIs implement rate limiting — leaving the majority vulnerable.</p>
            
            
              <h3>What is the difference between PUT and PATCH?</h3>
              <p>PUT replaces the entire resource — omitted fields are set to null or defaults. PATCH applies a partial update — only fields in the request body are changed. PUT is idempotent; identical PUT requests always produce the same resource state. PATCH is not guaranteed idempotent (though it can be designed to be). Use PATCH for field-level updates to avoid accidentally nulling fields the client didn&apos;t intend to modify.</p>
            
            
              <h3>When should I use cursor pagination vs offset pagination?</h3>
              <p>Use cursor pagination for any data that changes frequently: activity feeds, notification lists, real-time order streams. Cursor pagination is immune to the &quot;shifting window&quot; problem (no duplicate or skipped items when rows are inserted/deleted mid-traversal) and avoids expensive <code >COUNT(*)</code> queries. Use offset pagination for stable, rarely-changing data where users need random access to arbitrary pages (admin reports, CSV exports).</p>
            
            
              <h3>What security headers should my REST API return?</h3>
              <p>At minimum: <code >X-Content-Type-Options: nosniff</code>, <code >Strict-Transport-Security</code> with a year-long max-age, scoped CORS (never <code >*</code> for authenticated endpoints), and <code >Content-Type: application/json</code>. OWASP API Security Top 10 lists Security Misconfiguration as a leading category — improper CORS is one of the most common findings in security audits.</p>
            
            
              <h3>How do I handle errors consistently across all endpoints?</h3>
              <p>Define one error envelope and enforce it everywhere: a machine-readable <code >code</code>, a human-readable <code >message</code>, a <code >request_id</code> for log correlation, and a <code >details</code> array for field-level validation failures. Never expose stack traces, SQL errors, or internal paths in production. The <code >request_id</code> lets support engineers find the full trace in your logging system without exposing internals to end users.</p>
