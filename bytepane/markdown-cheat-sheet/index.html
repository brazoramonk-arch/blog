          <h2>What Is Markdown and Why Use It?</h2>
          <p>
            Markdown is a lightweight markup language created by John Gruber in 2004 that lets you write formatted text using plain text syntax. Instead of clicking toolbar buttons or writing HTML tags, you use simple characters like <code >#</code> for headings, <code >**</code> for bold, and <code >-</code> for lists. The syntax is designed to be readable even as raw text.
          </p>
          <p>
            Markdown has become the standard for developer documentation, README files, blog posts, technical writing, and note-taking. It is used on GitHub, GitLab, Stack Overflow, Reddit, Notion, Obsidian, Jupyter notebooks, and thousands of other platforms. Learning Markdown is one of the highest-leverage skills a developer can acquire.
          </p>
          <p>
            To practice and preview Markdown as you type, use our <a href="/markdown-preview/">Markdown Preview</a> tool. It renders your Markdown in real time, entirely in your browser.
          </p>
        

        
          <h2>Headings</h2>
          <p>
            Use hash symbols (<code >#</code>) to create headings. The number of hashes determines the heading level (1-6). Always leave a space between the hash and the heading text. Good practice is to use only one H1 per document.
          </p>
          <p>
            <code >`# Heading 1 (H1)
## Heading 2 (H2)
### Heading 3 (H3)
#### Heading 4 (H4)
##### Heading 5 (H5)
###### Heading 6 (H6)

<!-- Alternative syntax for H1 and H2 -->
Heading 1
=========

Heading 2
---------`</code>
          </pre>
        

        
          <h2>Text Formatting (Emphasis)</h2>
          <pre >
            <code >`*Italic text* or _italic text_
**Bold text** or __bold text__
***Bold and italic*** or ___bold and italic___
~~Strikethrough text~~ (GFM extension)
==Highlighted text== (some parsers)

<!-- Inline code -->
Use the \`console.log()\` function.

<!-- Subscript / Superscript (some parsers) -->
H~2~O (subscript)
X^2^ (superscript)`</code>
          </pre>
          <p >
            Prefer <code >*</code> for italic and <code >**</code> for bold. The underscore variants can cause issues mid-word (e.g., <code >file_name_here</code> might be parsed as italic in some renderers). Strikethrough with <code >~~</code> is a GitHub Flavored Markdown (GFM) extension supported on most platforms.
          </p>
        

        
          <h2>Links and Images</h2>
          <p>
            <code >`<!-- Inline link -->
[BytePane](https://bytepane.com/)
[BytePane](https://bytepane.com/ "Developer Tools")  <!-- with title -->

<!-- Reference-style link -->
[BytePane][1]
[1]: https://bytepane.com/ "Developer Tools"

<!-- Autolink (GFM) -->
https://bytepane.com/  <!-- automatically becomes a link -->

<!-- Image -->
![Alt text](image.png)
![Alt text](image.png "Optional title")

<!-- Linked image -->
[![Alt text](image.png)](https://bytepane.com/)

<!-- Image with reference -->
![Logo][logo]
[logo]: /images/logo.png "BytePane Logo"`</code>
          </pre>
          <p >
            Always include descriptive alt text for images -- it improves accessibility and SEO. Reference-style links are useful in documents with many URLs because they keep the body text clean and make link management easier. If your URLs contain special characters, remember to <a href="/blog/url-encoding-guide/">URL-encode</a> them.
          </p>
        

        
          <h2>Lists</h2>
          <p>
            <code >`<!-- Unordered list (use -, *, or +) -->
- Item 1
- Item 2
  - Nested item 2a
  - Nested item 2b
    - Deeply nested
- Item 3

<!-- Ordered list -->
1. First item
2. Second item
3. Third item
   1. Sub-item 3a
   2. Sub-item 3b

<!-- The actual numbers don't matter in most parsers -->
1. First
1. Second (still renders as 2)
1. Third (still renders as 3)

<!-- Task list / Checkbox (GFM) -->
- [x] Write the article
- [x] Add code examples
- [ ] Review and publish
- [ ] Promote on social media

<!-- Definition list (some parsers) -->
Term
: Definition of the term`</code>
          </pre>
          <p >
            Nest list items by indenting with 2 or 4 spaces (depending on the parser). Task lists with checkboxes are a GFM extension and are widely used in GitHub issues, pull request descriptions, and project management. For numbered lists, using <code >1.</code> for every item makes reordering easier since you do not need to renumber.
          </p>
        

        
          <h2>Code Blocks and Syntax Highlighting</h2>
          <p>
            Inline code uses single backticks. Code blocks use triple backticks (fenced code blocks) or 4-space indentation. Fenced code blocks support syntax highlighting by specifying the language after the opening backticks.
          </p>
          <p>
            <code >`<!-- Inline code -->
Run \`npm install\` to install dependencies.

<!-- Fenced code block with syntax highlighting -->
\`\`\`javascript
function greet(name) 
  return \`Hello, \$name!\`;

\`\`\`

\`\`\`python
def greet(name):
    return f"Hello, name!"
\`\`\`

\`\`\`json

  "name": "BytePane",
  "tools": 50,
  "free": true

\`\`\`

<!-- Indented code block (4 spaces) -->
    function oldStyle() 
        return "no syntax highlighting";
    

<!-- Diff syntax highlighting -->
\`\`\`diff
- const old = "removed line";
+ const new = "added line";
\`\`\``</code>
          </pre>
          <p >
            Popular language identifiers include: <code >javascript</code>, <code >typescript</code>, <code >python</code>, <code >bash</code>, <code >json</code>, <code >html</code>, <code >css</code>, <code >sql</code>, <code >yaml</code>, <code >go</code>, <code >rust</code>, <code >diff</code>. For JSON-specific formatting, our <a href="/json-formatter/">JSON Formatter</a> provides more features than basic code blocks. Compare code differences with our <a href="/diff-checker/">Diff Checker</a>.
          </p>
        

        
          <h2>Tables</h2>
          <p>
            Tables are a GFM extension. Use pipes (<code >|</code>) to separate columns and hyphens (<code >-</code>) to create the header separator. Control alignment with colons in the separator row.
          </p>
          <p>
            <code >`<!-- Basic table -->
| Tool | Category | Link |
| --- | --- | --- |
| JSON Formatter | Data | [Open](/json-formatter/) |
| Regex Tester | Text | [Open](/regex-tester/) |
| Color Converter | Design | [Open](/color-converter/) |

<!-- Aligned columns -->
| Left-aligned | Center-aligned | Right-aligned |
| :--- | :---: | ---: |
| Text | Text | Text |
| More text | More text | $99.99 |

<!-- Formatting inside table cells -->
| Feature | Supported |
| --- | --- |
| **Bold** text | Yes |
| \`inline code\` | Yes |
| [Links](/) | Yes |
| Images | Yes |
| Lists | No |
| Nested tables | No |`</code>
          </pre>
          <p >
            Tables do not need to be perfectly aligned in the source -- most renderers normalize the spacing. For complex data, consider linking to a JSON representation instead. Our <a href="/json-formatter/">JSON Formatter</a> can help format the data for embedding.
          </p>
        

        
          <h2>Blockquotes and Horizontal Rules</h2>
          <p>
            <code >`<!-- Blockquote -->
> This is a blockquote.
> It can span multiple lines.

> Nested blockquotes:
>> This is a nested quote.
>>> Three levels deep.

> **Tip:** You can use formatting inside blockquotes,
> including \`code\`, **bold**, and [links](/).

<!-- Horizontal rule (any of these work) -->
---
***
___`</code>
          </pre>
          <p >
            Blockquotes are commonly used for quoting external sources, callout boxes, and important notes. GitHub renders blockquotes with special styling when they start with keywords like <code >[!NOTE]</code>, <code >[!WARNING]</code>, or <code >[!TIP]</code>.
          </p>
          <p>
            <code >`<!-- GitHub Alert syntax -->
> [!NOTE]
> This is a note with special styling on GitHub.

> [!WARNING]
> This is a warning callout.

> [!TIP]
> This is a helpful tip.

> [!IMPORTANT]
> Critical information goes here.

> [!CAUTION]
> Proceed with care.`</code>
          </pre>
        

        
          <h2>HTML in Markdown</h2>
          <p >
            Most Markdown parsers allow raw HTML for features that Markdown does not support natively. This is useful for collapsible sections, keyboard shortcuts, complex layouts, and custom styling.
          </p>
          <p>
            <code >`<!-- Collapsible section -->
<details>
<summary>Click to expand</summary>

Hidden content goes here.
You can use **Markdown** inside HTML blocks.

</details>

<!-- Keyboard shortcuts -->
Press <kbd>Ctrl</kbd> + <kbd>C</kbd> to copy.

<!-- Centered text -->

  <h3>Centered Heading</h3>
  <p>Centered paragraph text.</p>

<!-- Colored text (limited platform support) -->
Colored text

<!-- Line break without a new paragraph -->
Line one<br>
Line two (same paragraph)`</code>
          </pre>
          <p>
            Be aware that HTML support varies across platforms. GitHub sanitizes HTML and removes <code >&lt;script&gt;</code> tags and event handlers. If you are writing HTML-heavy content, consider using our <a href="/html-formatter/">HTML Formatter</a> to optimize the output.
          </p>
        

        
          <h2>Footnotes, Abbreviations, and Advanced Syntax</h2>
          <p>
            <code >`<!-- Footnotes (GFM and many parsers) -->
This claim needs a source[^1].
Another referenced fact[^note].

[^1]: Source: RFC 7231, Section 6.
[^note]: This is a longer footnote with multiple paragraphs.

    Indent continuation lines with 4 spaces.

<!-- Abbreviation (some parsers) -->
The HTML specification is maintained by the W3C.

*[HTML]: HyperText Markup Language
*[W3C]: World Wide Web Consortium

<!-- Emoji (GFM) -->
:rocket: :fire: :thumbsup: :warning:

<!-- Table of Contents (auto-generated by some platforms) -->
[[toc]]
<!-- or -->
[TOC]

<!-- Escape special characters -->
\\*Not italic\\*
\\# Not a heading
\\[Not a link\\]()`</code>
          </pre>
          <p >
            Footnotes are part of the GFM specification and are supported on GitHub, GitLab, and most static site generators. They automatically create numbered references at the bottom of the document with back-links. Emoji shortcodes are replaced with actual emoji characters on platforms that support them.
          </p>
        

        
          <h2>Markdown for README Files</h2>
          <p>
            A well-structured README is the front door to any open-source project. Here is a template that covers all the essential sections using the Markdown syntax from this guide.
          </p>
          <p>
            <code >`# Project Name

![License](https://img.shields.io/badge/license-MIT-blue)
![Version](https://img.shields.io/badge/version-1.0.0-green)

> Brief description of the project in one or two sentences.

## Features

- Feature one with **bold** emphasis
- Feature two with \`code\` highlighting
- Feature three with [link to docs](/)

## Installation

\`\`\`bash
npm install project-name
\`\`\`

## Usage

\`\`\`javascript

feature.run();
\`\`\`

## API Reference

| Method | Parameters | Returns |
| --- | --- | --- |
| \`run()\` | \`options: Object\` | \`Promise<Result>\` |
| \`stop()\` | none | \`void\` |

## Contributing

1. Fork the repository
2. Create a feature branch
3. Submit a pull request

## License

MIT`</code>
          </pre>

            Test your README rendering with our <a href="/markdown-preview/">Markdown Preview</a> tool before pushing to GitHub. You can also validate any <a href="/json-formatter/">JSON configuration files</a> referenced in your project documentation.

          <h2>Markdown Best Practices</h2>
          <ol>
            <li><strong>Use ATX headings consistently</strong> -- Stick to <code >#</code> syntax rather than underline syntax. It is clearer, more widely supported, and easier to search.</li>
            <li><strong>Leave blank lines around blocks</strong> -- Put a blank line before and after headings, code blocks, lists, and blockquotes. This prevents parsing ambiguities across different Markdown engines.</li>
            <li><strong>Use fenced code blocks with language identifiers</strong> -- Always specify the language for syntax highlighting. It makes code dramatically more readable.</li>
            <li><strong>Keep lines under 120 characters</strong> -- While Markdown wraps automatically, shorter lines make diffs cleaner and the source easier to read in editors.</li>
            <li><strong>Use reference-style links for long documents</strong> -- They keep the body text clean and make link updates easier since each URL appears only once.</li>
            <li><strong>Always add alt text to images</strong> -- This improves accessibility, SEO, and provides context when images fail to load.</li>
            <li><strong>Test across renderers</strong> -- Different platforms parse Markdown slightly differently. Preview your content on the target platform before publishing. Use our <a href="/markdown-preview/">Markdown Preview</a> for quick testing.</li>
            <li><strong>Use a linter</strong> -- Tools like markdownlint enforce consistent style and catch common errors like duplicate headings, trailing spaces, and missing blank lines.</li>
          </ol>
        

        
          <h2>Frequently Asked Questions</h2>

          <h3>What is the difference between Markdown and GitHub Flavored Markdown (GFM)?</h3>
          <p>
            Standard Markdown (CommonMark) defines the basic syntax for headings, paragraphs, links, images, emphasis, code, and blockquotes. GitHub Flavored Markdown (GFM) extends CommonMark with tables, task lists (checkboxes), strikethrough text, autolinked URLs, syntax-highlighted fenced code blocks, and footnotes. GFM is used on GitHub, GitLab, and many documentation platforms.
          </p>

          <h3>How do I create a table in Markdown?</h3>
          <p>
            Use pipes (<code >|</code>) to separate columns and hyphens (<code >-</code>) to create the header row separator. For alignment, add colons: <code >:---</code> for left-align, <code >:---:</code> for center, <code >---:</code> for right-align. Tables are a GFM extension and are supported on most platforms including GitHub, GitLab, and many static site generators.
          </p>

          <h3>Can I use HTML inside Markdown?</h3>
          <p>
            Yes, most Markdown parsers allow inline HTML for features that Markdown does not support natively, such as <code >&lt;details&gt;</code> for collapsible sections, <code >&lt;kbd&gt;</code> for keyboard shortcuts, or complex table layouts. However, security-conscious platforms like GitHub sanitize HTML and remove script tags and event handlers. Raw HTML reduces portability across Markdown renderers.
          </p>
