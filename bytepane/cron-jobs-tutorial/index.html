        <h2>
          Cron Jobs Tutorial: Schedule Tasks Like a Pro
        </h2>
        
          Linux

      /* Article Content */
      

        
          <h2>What Are Cron Jobs?</h2>
          <p>
            Cron is a time-based job scheduler built into Unix and Linux operating systems. It lets you run commands or scripts automatically at specified intervals -- every minute, every hour, every Monday at 3 AM, or on the first day of each month. The cron daemon (<code >crond</code>) runs in the background and checks every minute whether any scheduled jobs need to execute.
          </p>
          <p>
            Cron jobs are fundamental to system administration and backend development. They handle database backups, log rotation, cache clearing, report generation, health checks, certificate renewal, and thousands of other recurring tasks. If you have ever scheduled a task to run automatically on a server, you have probably used cron.
          </p>
          <p>
            Writing cron expressions by hand is notoriously error-prone because of the compact syntax. Our <a href="/crontab-generator/">Crontab Generator</a> lets you build cron schedules visually and see a human-readable description of when the job will run, eliminating guesswork entirely.
          </p>
        

        
          <h2>Cron Syntax: The Five Fields Explained</h2>
          <p>
            A cron expression consists of five fields separated by spaces, followed by the command to execute. Each field represents a unit of time, and together they define exactly when the job runs.
          </p>
          <p>
            <code >`# ┌───────────── minute (0-59)
# │ ┌───────────── hour (0-23)
# │ │ ┌───────────── day of month (1-31)
# │ │ │ ┌───────────── month (1-12 or JAN-DEC)
# │ │ │ │ ┌───────────── day of week (0-7, 0 and 7 = Sunday, or SUN-SAT)
# │ │ │ │ │
# * * * * *  command_to_execute
  0 3 * * *  /usr/local/bin/backup.sh`</code>
          </pre>
          
            <table >
              <thead>
                <tr >
                  <th >Field</th>
                  <th >Allowed Values</th>
                  <th >Special Characters</th>
                </tr>
              </thead>
              <tbody >
                <tr ><td >Minute</td><td >0-59</td><td >* , - /</td></tr>
                <tr ><td >Hour</td><td >0-23</td><td >* , - /</td></tr>
                <tr ><td >Day of Month</td><td >1-31</td><td >* , - /</td></tr>
                <tr ><td >Month</td><td >1-12 or JAN-DEC</td><td >* , - /</td></tr>
                <tr><td >Day of Week</td><td >0-7 or SUN-SAT</td><td >* , - /</td></tr>
              </tbody>
            </table>
          

          <h3>Special Characters</h3>
          
            <table >
              <thead>
                <tr >
                  <th >Character</th>
                  <th >Meaning</th>
                  <th >Example</th>
                </tr>
              </thead>
              <tbody >
                <tr ><td >*</td><td >Every value in the field</td><td >* * * * * = every minute</td></tr>
                <tr ><td >,</td><td >List of values</td><td >1,15 = 1st and 15th</td></tr>
                <tr ><td >-</td><td >Range of values</td><td >1-5 = Monday through Friday</td></tr>
                <tr><td >/</td><td >Step values</td><td >*/15 = every 15 units</td></tr>
              </tbody>
            </table>
          
        

        
          <h2>Special Cron Strings</h2>
          <p >
            Most cron implementations support shorthand strings that replace the five-field expression. These are easier to read and less error-prone for common schedules.
          </p>
          
            <table >
              <thead>
                <tr >
                  <th >String</th>
                  <th >Equivalent</th>
                  <th >Description</th>
                </tr>
              </thead>
              <tbody >
                <tr ><td >@yearly</td><td >0 0 1 1 *</td><td >Once a year (midnight, Jan 1)</td></tr>
                <tr ><td >@monthly</td><td >0 0 1 * *</td><td >Once a month (midnight, 1st)</td></tr>
                <tr ><td >@weekly</td><td >0 0 * * 0</td><td >Once a week (midnight, Sunday)</td></tr>
                <tr ><td >@daily</td><td >0 0 * * *</td><td >Once a day (midnight)</td></tr>
                <tr ><td >@hourly</td><td >0 * * * *</td><td >Once an hour (at minute 0)</td></tr>
                <tr><td >@reboot</td><td >N/A</td><td >Once at system startup</td></tr>
              </tbody>
            </table>
          
          <p>
            <code >`# These two lines are identical:
0 0 * * *  /usr/local/bin/cleanup.sh
@daily     /usr/local/bin/cleanup.sh

# Run a script once when the system boots
@reboot    /home/deploy/start-app.sh`</code>
          </pre>
        

        
          <h2>Common Cron Schedule Patterns</h2>
          <p >
            Here are the most frequently used cron expressions in real-world server administration and application development. You can verify any of these in our <a href="/crontab-generator/">Crontab Generator</a> to see a human-readable description of the schedule.
          </p>
          <p>
            <code >`# Every 5 minutes
*/5 * * * *  /scripts/health-check.sh

# Every hour at minute 30
30 * * * *  /scripts/sync-data.sh

# Every day at 3:00 AM
0 3 * * *  /scripts/backup-database.sh

# Every Monday at 9:00 AM
0 9 * * 1  /scripts/weekly-report.sh

# Every weekday (Mon-Fri) at 8:00 AM
0 8 * * 1-5  /scripts/morning-tasks.sh

# First day of every month at midnight
0 0 1 * *  /scripts/monthly-cleanup.sh

# Every 15 minutes during business hours (9-17)
*/15 9-17 * * 1-5  /scripts/check-queue.sh

# Twice a day at 6 AM and 6 PM
0 6,18 * * *  /scripts/generate-report.sh

# Every Sunday at 2:30 AM
30 2 * * 0  /scripts/full-backup.sh

# Last day of February (run on 28th, skip non-leap years)
0 0 28 2 *  /scripts/leap-year-check.sh`</code>
          </pre>
          <p >
            A common mistake is confusing the day-of-month and day-of-week fields. When both are specified with non-wildcard values, cron runs the job if either condition is true (OR logic), not when both are true (AND logic). This surprises many developers and is a frequent source of scheduling bugs.
          </p>
        

        
          <h2>Managing Crontab: Essential Commands</h2>
          <p>
            The <code >crontab</code> command is the primary interface for creating, viewing, and editing cron jobs. Each user has their own crontab file, and root has access to a system-wide crontab as well.
          </p>
          <p>
            <code >`# View your current crontab
crontab -l

# Edit your crontab (opens in default editor)
crontab -e

# Remove all your cron jobs (BE CAREFUL)
crontab -r

# View another user's crontab (root only)
crontab -u username -l

# Install a crontab from a file
crontab /path/to/crontab-file

# Set the editor for crontab -e
export VISUAL=nano
# or
export EDITOR=vim`</code>
          </pre>

          <h3>System-Wide vs User Crontab</h3>
          <p >
            There are two types of cron configurations. User crontabs are managed with <code >crontab -e</code> and stored in <code >/var/spool/cron/</code>. System crontabs live in <code >/etc/crontab</code> and <code >/etc/cron.d/</code> and include an extra field for the username.
          </p>
          <p>
            <code >`# User crontab (no username field):
0 3 * * *  /home/deploy/backup.sh

# System crontab (/etc/crontab) - has username field:
0 3 * * *  root  /usr/local/bin/backup.sh

# System cron directories (scripts placed here run automatically):
/etc/cron.hourly/   # Runs every hour
/etc/cron.daily/    # Runs once per day
/etc/cron.weekly/   # Runs once per week
/etc/cron.monthly/  # Runs once per month`</code>
          </pre>
          <p >
            Understanding file permissions is essential when working with cron jobs, since the scripts cron executes must have the correct execute permissions. Our <a href="/blog/linux-file-permissions/">Linux File Permissions</a> guide and <a href="/chmod-calculator/">Chmod Calculator</a> can help you set these correctly.
          </p>
        

        
          <h2>Environment Variables and PATH</h2>
          <p>
            One of the most common reasons cron jobs fail silently is the difference between your interactive shell environment and the cron environment. When cron runs your command, it uses a minimal environment -- your <code >PATH</code>, shell aliases, and environment variables are not available unless you explicitly set them.
          </p>
          <p>
            <code >`# BAD: This might fail in cron because 'node' is not in cron's PATH
*/5 * * * *  node /home/deploy/app.js

# GOOD: Use the full path to the executable
*/5 * * * *  /usr/local/bin/node /home/deploy/app.js

# GOOD: Set PATH at the top of your crontab
PATH=/usr/local/bin:/usr/bin:/bin
*/5 * * * *  node /home/deploy/app.js

# Set environment variables in crontab
SHELL=/bin/bash
MAILTO=admin@example.com
NODE_ENV=production

0 3 * * *  /home/deploy/backup.sh`</code>
          </pre>
          <p >
            Best practice: always use absolute paths for both the interpreter and the script. Run <code >which node</code> or <code >which python3</code> to find the full path to your interpreters, and use those paths in your crontab.
          </p>
        

        
          <h2>Logging and Output Redirection</h2>
          <p>
            By default, cron sends any output (stdout and stderr) from your job as an email to the user who owns the crontab. On most servers, this email goes nowhere because no local mail transport is configured. This means errors are silently swallowed. Always redirect output explicitly.
          </p>
          <p>
            <code >`# Redirect stdout to a log file, stderr to the same file
0 3 * * *  /scripts/backup.sh >> /var/log/backup.log 2>&1

# Redirect stdout to log, stderr to a separate error log
0 3 * * *  /scripts/backup.sh >> /var/log/backup.log 2>> /var/log/backup-error.log

# Discard all output (not recommended -- you lose error info)
0 3 * * *  /scripts/backup.sh > /dev/null 2>&1

# Add timestamps to log entries
0 3 * * *  echo "$(date '+\\%Y-\\%m-\\%d \\%H:\\%M:\\%S') Starting backup" >> /var/log/backup.log && /scripts/backup.sh >> /var/log/backup.log 2>&1

# Send email on failure only
0 3 * * *  /scripts/backup.sh > /dev/null 2>&1 || echo "Backup failed" | mail -s "Backup Alert" admin@example.com`</code>
          </pre>
          <p >
            Important: percent signs (<code >%</code>) have special meaning in crontab files -- they are converted to newlines. If your command uses percent signs (common with <code >date</code> formatting), you must escape them with a backslash: <code >\%</code>.
          </p>
        

        
          <h2>Debugging Cron Jobs</h2>
          <p>
            Cron jobs fail silently more often than any other system component. When a job does not run or produces unexpected results, follow this systematic debugging checklist.
          </p>
          <ol>
            <li><strong>Check that cron is running</strong> -- Run <code >systemctl status cron</code> (or <code >crond</code> on RHEL/CentOS). If it is stopped, start it.</li>
            <li><strong>Check the cron log</strong> -- Cron logs every job execution to syslog. Check <code >/var/log/syslog</code> or <code >/var/log/cron</code> for entries mentioning your job.</li>
            <li><strong>Test the command manually</strong> -- Run the exact command from the crontab in a fresh shell with <code >env -i /bin/bash --noprofile --norc</code> to simulate the cron environment.</li>
            <li><strong>Verify PATH and permissions</strong> -- Use absolute paths for all executables. Ensure the script has execute permission (<code >chmod +x script.sh</code>).</li>
            <li><strong>Check for percent signs</strong> -- Unescaped <code >%</code> characters silently break cron commands. Escape them with <code >\%</code>.</li>
            <li><strong>Verify the cron expression</strong> -- Use our <a href="/crontab-generator/">Crontab Generator</a> to double-check that the schedule is what you intend.</li>
            <li><strong>Check for overlapping runs</strong> -- If a job takes longer than its interval, you may get multiple simultaneous instances. Use flock for locking (shown below).</li>
          </ol>

          <p>
            <code >`# Check if cron daemon is running
systemctl status cron

# View cron log entries for your jobs
grep CRON /var/log/syslog | tail -20

# Simulate the cron environment for testing
env -i SHELL=/bin/bash HOME=$HOME PATH=/usr/bin:/bin /your/script.sh

# Prevent overlapping job runs with flock
*/5 * * * *  flock -n /tmp/myjob.lock /scripts/long-running-job.sh`</code>
          </pre>
        

        
          <h2>Real-World Cron Job Examples</h2>
          <p >
            Here are production-ready cron job patterns that cover the most common server administration and application maintenance tasks. Each example includes proper logging and error handling.
          </p>

          <h3>Database Backup with Rotation</h3>
          <p>
            <code >`#!/bin/bash
# /scripts/backup-postgres.sh
# Run daily at 2 AM: 0 2 * * * /scripts/backup-postgres.sh

BACKUP_DIR="/backups/postgres"
DATE=$(date +%Y%m%d_%H%M%S)
DB_NAME="production"

# Create backup
pg_dump $DB_NAME | gzip > "$BACKUP_DIR/$DB_NAME-$DATE.sql.gz"

# Delete backups older than 30 days
find $BACKUP_DIR -name "*.sql.gz" -mtime +30 -delete

echo "$(date) Backup completed: $DB_NAME-$DATE.sql.gz"`</code>
          </pre>

          <h3>SSL Certificate Auto-Renewal</h3>
          <pre >
            <code >`# Attempt renewal twice daily (Let's Encrypt recommends this)
0 0,12 * * * /usr/bin/certbot renew --quiet --post-hook "systemctl reload nginx" >> /var/log/certbot.log 2>&1`</code>
          </pre>

          <h3>Log Cleanup and Rotation</h3>
          <pre >
            <code >`# Clean application logs older than 7 days every Sunday at 1 AM
0 1 * * 0 find /var/log/myapp/ -name "*.log" -mtime +7 -delete >> /var/log/cleanup.log 2>&1

# Compress logs older than 1 day, delete after 30 days
0 2 * * * find /var/log/myapp/ -name "*.log" -mtime +1 ! -name "*.gz" -exec gzip  \\;
0 3 * * * find /var/log/myapp/ -name "*.log.gz" -mtime +30 -delete`</code>
          </pre>

          <h3>Health Check with Alerting</h3>
          <pre >
            <code >`#!/bin/bash
# /scripts/health-check.sh
# Run every 5 minutes: */5 * * * * /scripts/health-check.sh

URL="https://myapp.com/health"
STATUS=$(curl -s -o /dev/null -w "%http_code" --max-time 10 "$URL")

if [ "$STATUS" != "200" ]; then
  echo "$(date) ALERT: Health check failed with status $STATUS" >> /var/log/health.log
  curl -X POST "https://hooks.slack.com/services/..." \\
    -d '"text":"Health check failed! Status: '"$STATUS"'"'
fi`</code>
          </pre>
          <p >
            The health check script uses HTTP status codes to determine whether the application is healthy. For a deep understanding of what each status code means, see our <a href="/http-status-codes/">HTTP Status Codes</a> reference tool.
          </p>
        

        
          <h2>Cron Alternatives: systemd Timers</h2>
          <p>
            On modern Linux distributions, systemd timers offer an alternative to cron with more features: dependency management, resource control (CPU/memory limits), calendar-based scheduling with timezone support, and built-in logging through journald. While cron remains the simpler and more portable choice, systemd timers are worth considering for complex scheduling requirements.
          </p>
          <p>
            <code >`# /etc/systemd/system/backup.timer
[Unit]
Description=Daily database backup

[Timer]
OnCalendar=*-*-* 03:00:00
Persistent=true
RandomizedDelaySec=300

[Install]
WantedBy=timers.target

# /etc/systemd/system/backup.service
[Unit]
Description=Database backup service

[Service]
Type=oneshot
ExecStart=/scripts/backup-postgres.sh
User=postgres

# Enable and start the timer
# systemctl enable --now backup.timer
# systemctl list-timers --all`</code>
          </pre>
          <p >
            The <code >Persistent=true</code> option ensures missed runs are executed on next boot, and <code >RandomizedDelaySec</code> adds jitter to prevent all servers in a cluster from running backups at the exact same second.
          </p>
        

        
          <h2>Cron Security Best Practices</h2>
          <p>
            Cron jobs run with the permissions of the user who owns the crontab. A misconfigured cron job can be a serious security vulnerability. Follow these best practices to keep your scheduled tasks secure.
          </p>
          <ol>
            <li><strong>Use the principle of least privilege</strong> -- Never run cron jobs as root unless absolutely necessary. Create dedicated service accounts with minimal permissions.</li>
            <li><strong>Restrict crontab access</strong> -- Use <code >/etc/cron.allow</code> and <code >/etc/cron.deny</code> to control which users can create cron jobs.</li>
            <li><strong>Secure script permissions</strong> -- Scripts executed by cron should be owned by the user running them and not writable by others. Use <code >chmod 700</code> for sensitive scripts.</li>
            <li><strong>Never hardcode credentials</strong> -- Use environment variables, secrets managers, or restricted-access configuration files instead of putting passwords directly in crontab entries or scripts.</li>
            <li><strong>Audit cron jobs regularly</strong> -- Review all user and system crontabs periodically. An attacker who gains shell access may install a persistent backdoor via cron.</li>
            <li><strong>Log everything</strong> -- Always redirect output to log files. Silent failures in cron jobs can go unnoticed for weeks or months.</li>
          </ol>
        

        
          <h2>Frequently Asked Questions</h2>

          
            
              <h3>Why is my cron job not running?</h3>
              <p>
                The most common causes are: the cron daemon is stopped, the cron expression has a syntax error, the script lacks execute permissions, the command relies on environment variables not available in cron, or the PATH does not include the required executables. Check <code >/var/log/syslog</code> for cron entries and always use absolute paths.
              </p>
            
            
              <h3>How do I run a cron job every 30 seconds?</h3>
              <p>
                Cron&apos;s minimum resolution is one minute. To run something every 30 seconds, create two cron entries: one normal and one with a 30-second sleep: <code >* * * * * /script.sh</code> and <code >* * * * * sleep 30 && /script.sh</code>. For sub-minute scheduling, consider using a systemd timer with <code >OnUnitActiveSec=30s</code> or a process manager like supervisord.
              </p>
            
            
              <h3>What timezone does cron use?</h3>
              <p>
                By default, cron uses the system timezone. On most servers this is UTC. You can check with <code >timedatectl</code>. Some cron implementations support a <code >CRON_TZ</code> variable at the top of the crontab to override the timezone for all jobs in that file. systemd timers offer more flexible timezone handling.
              </p>
            
            
              <h3>How do I prevent overlapping cron job runs?</h3>
              <p>
                Use <code >flock</code> to create a lock file: <code >flock -n /tmp/myjob.lock /scripts/job.sh</code>. The <code >-n</code> flag makes flock exit immediately (without running the job) if another instance already holds the lock. This ensures only one instance runs at a time.
              </p>
