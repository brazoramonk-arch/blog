          <h2>Understanding the Linux Permission Model</h2>
          <p>
            Every file and directory in Linux has a set of permissions that controls who can read, write, and execute it. This permission model is the foundation of Linux security. Understanding it is essential for every developer, system administrator, and DevOps engineer who works with Linux servers, containers, or deployments.
          </p>
          <p>
            Linux permissions operate on three levels: the file owner (user), the group assigned to the file, and everyone else (other). Each level can independently be granted read, write, and execute permissions. This creates a simple but powerful access control system that protects sensitive files while allowing collaboration.
          </p>
          <p>
            To quickly calculate permission values without memorizing the octal system, use our <a href="/chmod-calculator/">Chmod Calculator</a>. It converts between symbolic and octal notation and shows exactly what each permission means.
          </p>
          <p>
            <code >`# View file permissions with ls -l
$ ls -l myfile.txt
-rw-r--r-- 1 alice developers 4096 Mar 06 10:30 myfile.txt

# Breaking down the output:
# -rw-r--r--  →  file type + permissions
# 1           →  number of hard links
# alice       →  owner (user)
# developers  →  group
# 4096        →  file size in bytes
# Mar 06 10:30 → last modified
# myfile.txt  →  filename`</code>
          </pre>
        

        
          <h2>Read, Write, and Execute Explained</h2>
          <p >
            The three basic permissions -- read (r), write (w), and execute (x) -- have different meanings depending on whether they are applied to files or directories. Understanding this distinction prevents common permission mistakes.
          </p>

          <h3>Permissions on Files</h3>
          
            <table >
              <thead>
                <tr >
                  <th >Permission</th>
                  <th >Symbol</th>
                  <th >Octal</th>
                  <th >Effect on Files</th>
                </tr>
              </thead>
              <tbody >
                <tr ><td >Read</td><td >r</td><td >4</td><td >View file contents (cat, less, head)</td></tr>
                <tr ><td >Write</td><td >w</td><td >2</td><td >Modify file contents (edit, truncate, append)</td></tr>
                <tr><td >Execute</td><td >x</td><td >1</td><td >Run as a program or script</td></tr>
              </tbody>
            </table>
          

          <h3>Permissions on Directories</h3>
          
            <table >
              <thead>
                <tr >
                  <th >Permission</th>
                  <th >Symbol</th>
                  <th >Octal</th>
                  <th >Effect on Directories</th>
                </tr>
              </thead>
              <tbody >
                <tr ><td >Read</td><td >r</td><td >4</td><td >List directory contents (ls)</td></tr>
                <tr ><td >Write</td><td >w</td><td >2</td><td >Create, rename, or delete files inside</td></tr>
                <tr><td >Execute</td><td >x</td><td >1</td><td >Enter directory (cd) and access files within</td></tr>
              </tbody>
            </table>
          
          <p>
            A common mistake is giving a directory read permission without execute. A user with only <code >r</code> on a directory can list file names but cannot access the files themselves or see their metadata. You need <code >x</code> to actually enter the directory and interact with its contents.
          </p>
          <p>
            <code >`# The permission string has 10 characters:
# -rwxrw-r--
# │└┬┘└┬┘└┬┘
# │ │  │  └── Other permissions (r--)  = read only
# │ │  └───── Group permissions (rw-)  = read + write
# │ └──────── Owner permissions (rwx)  = read + write + execute
# └────────── File type (- = file, d = directory, l = symlink)

# Examples:
# drwxr-xr-x  → directory, owner=rwx, group=r-x, other=r-x
# -rwx------  → file, only owner can read/write/execute
# -rw-rw-r--  → file, owner and group can read/write, others read only
# lrwxrwxrwx  → symbolic link (permissions on link itself are meaningless)`</code>
          </pre>
        

        
          <h2>Octal (Numeric) Notation</h2>
          <p >
            Octal notation represents permissions as a three or four digit number. Each digit is the sum of its component permissions: read (4) + write (2) + execute (1). This is the most common way to set permissions with the <code >chmod</code> command.
          </p>
          
            <table >
              <thead>
                <tr >
                  <th >Octal</th>
                  <th >Binary</th>
                  <th >Symbolic</th>
                  <th >Meaning</th>
                </tr>
              </thead>
              <tbody >
                <tr ><td >0</td><td >000</td><td >---</td><td >No permissions</td></tr>
                <tr ><td >1</td><td >001</td><td >--x</td><td >Execute only</td></tr>
                <tr ><td >2</td><td >010</td><td >-w-</td><td >Write only</td></tr>
                <tr ><td >3</td><td >011</td><td >-wx</td><td >Write + execute</td></tr>
                <tr ><td >4</td><td >100</td><td >r--</td><td >Read only</td></tr>
                <tr ><td >5</td><td >101</td><td >r-x</td><td >Read + execute</td></tr>
                <tr ><td >6</td><td >110</td><td >rw-</td><td >Read + write</td></tr>
                <tr><td >7</td><td >111</td><td >rwx</td><td >Read + write + execute</td></tr>
              </tbody>
            </table>
          
          <p>
            <code >`# Common octal permission values:
# 755 = rwxr-xr-x  → Standard for directories and executables
# 644 = rw-r--r--  → Standard for regular files
# 600 = rw-------  → Private files (SSH keys, configs with secrets)
# 700 = rwx------  → Private directories or scripts
# 775 = rwxrwxr-x  → Shared directories (group can write)
# 664 = rw-rw-r--  → Shared files (group can write)
# 777 = rwxrwxrwx  → NEVER use this — everyone has full access
# 000 = ---------  → No access for anyone (except root)

# How to calculate: add up the values for each position
# Owner: r(4) + w(2) + x(1) = 7
# Group: r(4) + -(0) + x(1) = 5
# Other: r(4) + -(0) + -(0) = 4
# Result: 754`</code>
          </pre>
          <p >
            Skip the mental math -- use our <a href="/chmod-calculator/">Chmod Calculator</a> to convert between octal and symbolic notation instantly. Toggle checkboxes for each permission and get the exact chmod command.
          </p>
        

        
          <h2>The chmod Command: Changing Permissions</h2>
          <p>
            The <code >chmod</code> (change mode) command modifies file and directory permissions. You can use either octal notation or symbolic notation to specify the desired permissions.
          </p>

          <h3>Octal Mode</h3>
          <p>
            <code >`# Set exact permissions using octal
chmod 755 script.sh       # rwxr-xr-x (executable script)
chmod 644 config.json     # rw-r--r-- (readable config)
chmod 600 id_rsa          # rw------- (private SSH key)
chmod 700 ~/.ssh          # rwx------ (private directory)

# Apply recursively to directory and all contents
chmod -R 755 /var/www/html/
chmod -R 644 /var/www/html/*.css`</code>
          </pre>

          <h3>Symbolic Mode</h3>
          <p >
            Symbolic mode uses letters and operators to add, remove, or set specific permissions without affecting others. This is more flexible than octal mode when you need to change just one permission.
          </p>
          <p>
            <code >`# Symbolic mode syntax: chmod [who][operator][permission] file
# Who:      u = owner, g = group, o = other, a = all
# Operator: + = add, - = remove, = = set exactly
# Permission: r = read, w = write, x = execute

# Add execute permission for the owner
chmod u+x script.sh

# Remove write permission from group and other
chmod go-w sensitive.conf

# Set group permissions to read-only
chmod g=r document.txt

# Add execute to all (owner, group, other)
chmod a+x deploy.sh

# Multiple operations in one command
chmod u+rwx,g+rx,o-rwx private-script.sh

# Make a file executable (common shortcut)
chmod +x run.sh`</code>
          </pre>

          <h3>Symbolic vs Octal: When to Use Each</h3>
          <p >
            Use octal when you want to set all permissions at once (e.g., <code >chmod 644 file</code>). Use symbolic when you want to modify a specific permission without changing the others (e.g., <code >chmod g+w file</code>). In scripts and documentation, octal is more common because it is unambiguous.
          </p>
        

        
          <h2>chown and chgrp: Changing Ownership</h2>
          <p>
            Permissions only matter when combined with ownership. The <code >chown</code> command changes the owner and/or group of a file, while <code >chgrp</code> changes only the group. Only root (or sudo) can change file ownership.
          </p>
          <p>
            <code >`# Change owner
sudo chown alice myfile.txt          # Owner → alice
sudo chown alice:developers myfile.txt  # Owner → alice, Group → developers

# Change group only
sudo chgrp developers myfile.txt     # Group → developers
sudo chown :developers myfile.txt    # Same as above (shorthand)

# Change ownership recursively
sudo chown -R www-data:www-data /var/www/html/

# Common use cases:
# Web server files
sudo chown -R www-data:www-data /var/www/
sudo chmod -R 755 /var/www/

# Application deployment
sudo chown -R deploy:deploy /opt/myapp/

# Fix home directory after user creation
sudo chown -R newuser:newuser /home/newuser/`</code>
          </pre>
        

        
          <h2>Special Permissions: Setuid, Setgid, and Sticky Bit</h2>
          <p >
            Beyond the standard read, write, and execute permissions, Linux has three special permission bits that modify how files and directories behave when accessed. These are represented by a fourth octal digit prepended to the standard three.
          </p>

          <h3>Setuid (Set User ID) -- 4000</h3>
          <p>
            When setuid is set on an executable, it runs with the permissions of the file owner (not the user who launched it). This is how commands like <code >passwd</code> can modify /etc/shadow even when run by a normal user -- the passwd binary is owned by root with setuid set.
          </p>
          <p>
            <code >`# View setuid files (shown as 's' in owner execute position)
$ ls -l /usr/bin/passwd
-rwsr-xr-x 1 root root 68208 Mar 06 /usr/bin/passwd
#   ^-- 's' instead of 'x' means setuid is set

# Set setuid
chmod 4755 myprogram    # setuid + rwxr-xr-x
chmod u+s myprogram     # Symbolic notation

# SECURITY WARNING: setuid is dangerous!
# A setuid root program with a vulnerability gives attackers root access.
# Only use setuid when absolutely necessary and audit the code carefully.`</code>
          </pre>

          <h3>Setgid (Set Group ID) -- 2000</h3>
          <p >
            On files, setgid works like setuid but for the group -- the program runs with the group permissions of the file. On directories, setgid is much more useful: all new files created inside the directory inherit the directory&apos;s group instead of the creator&apos;s primary group. This is essential for shared project directories.
          </p>
          <p>
            <code >`# Set setgid on a shared directory
chmod 2775 /shared/project/
chmod g+s /shared/project/

# Now all files created in /shared/project/ inherit the group
$ ls -ld /shared/project/
drwxrwsr-x 2 root developers 4096 Mar 06 /shared/project/
#      ^-- 's' in group execute position means setgid

# Without setgid: new files get creator's primary group
# With setgid:    new files get directory's group (developers)`</code>
          </pre>

          <h3>Sticky Bit -- 1000</h3>
          <p >
            The sticky bit on a directory prevents users from deleting or renaming files they do not own, even if they have write permission on the directory. The most well-known example is <code >/tmp</code>, where everyone can create files but only the owner (or root) can delete them.
          </p>
          <p>
            <code >`# View the sticky bit on /tmp
$ ls -ld /tmp
drwxrwxrwt 15 root root 4096 Mar 06 /tmp
#         ^-- 't' in other execute position means sticky bit

# Set sticky bit
chmod 1777 /shared/uploads/
chmod +t /shared/uploads/

# Without sticky bit: any user with write permission can delete any file
# With sticky bit:    users can only delete their own files`</code>
          </pre>

          
            <table >
              <thead>
                <tr >
                  <th >Special Permission</th>
                  <th >Octal</th>
                  <th >On Files</th>
                  <th >On Directories</th>
                </tr>
              </thead>
              <tbody >
                <tr ><td >Setuid</td><td >4000</td><td >Runs as file owner</td><td >No effect</td></tr>
                <tr ><td >Setgid</td><td >2000</td><td >Runs as file group</td><td >New files inherit group</td></tr>
                <tr><td >Sticky bit</td><td >1000</td><td >No modern effect</td><td >Only owner can delete</td></tr>
              </tbody>
            </table>
          
        

        
          <h2>The umask: Default Permission Control</h2>
          <p >
            The <code >umask</code> (user file-creation mode mask) determines the default permissions for newly created files and directories. It works by subtracting permissions from the system defaults: 666 for files and 777 for directories.
          </p>
          <p>
            <code >`# View current umask
$ umask
0022

# How umask works:
# Default file permissions:   666 (rw-rw-rw-)
# umask:                     -022
# Result:                     644 (rw-r--r--)

# Default directory permissions: 777 (rwxrwxrwx)
# umask:                        -022
# Result:                        755 (rwxr-xr-x)

# Common umask values:
# 022 → files=644, dirs=755 (standard, group/other can read)
# 027 → files=640, dirs=750 (group can read, others blocked)
# 077 → files=600, dirs=700 (private, only owner has access)
# 002 → files=664, dirs=775 (shared, group can write)

# Set umask (for current session)
umask 027

# Set umask permanently (add to ~/.bashrc or ~/.profile)
echo "umask 027" >> ~/.bashrc`</code>
          </pre>
        

        
          <h2>Access Control Lists (ACLs)</h2>
          <p >
            Standard Linux permissions only support one owner and one group per file. Access Control Lists (ACLs) extend this model by allowing you to grant specific permissions to any number of individual users or groups. ACLs are essential when the simple owner/group/other model is too restrictive.
          </p>
          <p>
            <code >`# Check if ACLs are supported (look for acl in mount options)
$ mount | grep acl

# View ACLs on a file
$ getfacl myfile.txt
# file: myfile.txt
# owner: alice
# group: developers
user::rw-
user:bob:r--          # Bob has read access (ACL entry)
group::r--
group:designers:rw-   # designers group has read/write (ACL entry)
mask::rw-
other::---

# Set ACL: give user bob read+write access
setfacl -m u:bob:rw myfile.txt

# Set ACL: give group designers read access
setfacl -m g:designers:r myfile.txt

# Set ACL: remove bob's ACL entry
setfacl -x u:bob myfile.txt

# Set default ACLs on a directory (inherited by new files)
setfacl -d -m g:developers:rwx /shared/project/

# Remove all ACLs
setfacl -b myfile.txt

# A '+' in ls -l indicates ACLs are present
$ ls -l myfile.txt
-rw-rw----+ 1 alice developers 4096 Mar 06 myfile.txt
#          ^-- '+' means ACLs exist`</code>
          </pre>
        

        
          <h2>Common Permission Schemes and Security Tips</h2>
          <p >
            Here are the most common permission configurations used in production Linux systems, along with security best practices that prevent common vulnerabilities.
          </p>

          <h3>Web Server Files</h3>
          <p>
            <code >`# Nginx/Apache document root
sudo chown -R www-data:www-data /var/www/html/
sudo find /var/www/html/ -type d -exec chmod 755  \\;  # Directories
sudo find /var/www/html/ -type f -exec chmod 644  \\;  # Files

# Upload directories (web server needs write access)
sudo chmod 775 /var/www/html/uploads/

# PHP/CGI scripts
sudo chmod 750 /var/www/html/cgi-bin/*.php`</code>
          </pre>

          <h3>SSH Keys</h3>
          <pre >
            <code >`# SSH is strict about permissions — wrong permissions = connection refused
chmod 700 ~/.ssh/              # Directory: owner only
chmod 600 ~/.ssh/id_rsa        # Private key: owner read/write only
chmod 644 ~/.ssh/id_rsa.pub    # Public key: anyone can read
chmod 600 ~/.ssh/authorized_keys  # Authorized keys: owner only
chmod 600 ~/.ssh/config        # SSH config: owner only`</code>
          </pre>

          <h3>Application Deployment</h3>
          <pre >
            <code >`# Application directory
sudo chown -R deploy:deploy /opt/myapp/
sudo chmod 750 /opt/myapp/
sudo chmod 640 /opt/myapp/.env           # Environment secrets
sudo chmod 750 /opt/myapp/bin/*          # Executables

# Log directory (app needs write, monitoring needs read)
sudo chown deploy:monitoring /var/log/myapp/
sudo chmod 2750 /var/log/myapp/          # setgid for group inheritance

# Cron jobs
chmod 600 /etc/cron.d/myapp-cron         # Only root should read cron configs`</code>
          </pre>

          <h3>Security Rules to Follow</h3>
          <ol>
            <li><strong>Never use 777</strong> -- If you think you need 777, you have a different problem. Fix ownership or group membership instead.</li>
            <li><strong>Never use 666 on executables</strong> -- World-writable executables can be replaced with malicious code by any user.</li>
            <li><strong>Principle of least privilege</strong> -- Grant the minimum permissions needed. Start restrictive and add permissions as needed.</li>
            <li><strong>Check for world-writable files regularly</strong> -- Run <code >find / -perm -o+w -type f</code> to find world-writable files.</li>
            <li><strong>Audit setuid binaries</strong> -- Run <code >find / -perm -4000 -type f</code> to find all setuid programs. Each one is a potential privilege escalation vector.</li>
            <li><strong>Protect sensitive config files</strong> -- Database passwords, API keys, and .env files should be 600 or 640 at most.</li>
          </ol>

        /* FAQ Section */
        
          <h2>Frequently Asked Questions</h2>
          
            
              <h3>Why can root access files with 000 permissions?</h3>
              <p>
                Root (UID 0) bypasses all standard permission checks. The root user can read, write, and execute any file regardless of its permissions. This is by design -- root is the system administrator and needs unrestricted access for maintenance. The only exception is that root cannot execute a file without at least one execute bit set (the kernel enforces this).
              </p>
            
            
              <h3>What is the difference between chmod 755 and chmod 775?</h3>
              <p>
                With 755 (rwxr-xr-x), the group can read and execute but cannot write. With 775 (rwxrwxr-x), the group can also write. Use 755 for files that only the owner should modify. Use 775 for shared directories where multiple users in the same group need to create and edit files.
              </p>
            
            
              <h3>Why does SSH refuse to connect when my key permissions are wrong?</h3>
              <p>
                SSH intentionally refuses to use private keys that are readable by other users. If your <code >~/.ssh/id_rsa</code> has permissions other than 600, SSH will display &quot;WARNING: UNPROTECTED PRIVATE KEY FILE!&quot; and ignore the key. Fix it with <code >chmod 600 ~/.ssh/id_rsa</code>. The same applies to the ~/.ssh directory (must be 700) and authorized_keys (must be 600).
              </p>
            
            
              <h3>How do I recursively set different permissions for files and directories?</h3>
              <p>
                Use the <code >find</code> command with <code >-type</code> to target files and directories separately. For example: <code >find /path -type d -exec chmod 755 ''  \;</code> for directories and <code >find /path -type f -exec chmod 644 ''  \;</code> for files. Never use <code >chmod -R 755</code> on everything, because files do not need execute permission.
              </p>
            
            
              <h3>Can I make a file immutable so even root cannot modify it?</h3>
              <p>
                Yes, using file attributes with <code >chattr</code>. Running <code >sudo chattr +i myfile</code> sets the immutable attribute, preventing any modification, deletion, or renaming -- even by root. To undo it, run <code >sudo chattr -i myfile</code>. This is useful for protecting critical configuration files from accidental changes. View attributes with <code >lsattr myfile</code>.
              </p>
